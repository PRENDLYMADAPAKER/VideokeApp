<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NZM Platinum Videoke Pro</title>
  <style>
    :root {
      --platinum-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --dark-bg: #050505;
      --drawer-bg: rgba(15, 15, 15, 0.98);
      --glass-border: 1px solid rgba(212, 175, 55, 0.3);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body, html {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      background: #000;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden; /* Lock screen for landscape feel */
    }

    /* THE MAIN VIEWPORT - SIDE BY SIDE */
    #main-wrapper {
      display: flex;
      width: 100vw;
      height: 100vh;
      transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
    }

    /* THE VIDEO STAGE */
    #stage {
      flex: 1; /* Takes full width by default */
      height: 100%;
      background: #000;
      position: relative;
      transition: flex 0.5s ease;
    }

    /* When drawer is open, stage shrinks to half */
    body.drawer-open #stage {
      flex: 0.5; 
    }

    #player-wrapper { width: 100%; height: 100%; pointer-events: none; }

    #touch-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      cursor: pointer;
    }

    /* THE RIGHT SIDE DRAWER */
    #side-drawer {
      width: 0; /* Hidden by default */
      height: 100%;
      background: var(--drawer-bg);
      border-left: var(--glass-border);
      overflow: hidden;
      transition: width 0.5s cubic-bezier(0.2, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
    }

    body.drawer-open #side-drawer {
      width: 50vw; /* Takes the other half */
      padding: 20px;
    }

    /* UI ELEMENTS */
    .drawer-content { min-width: 40vw; } /* Keeps content from squishing during animation */

    .panel {
      background: rgba(255,255,255,0.05);
      border: var(--glass-border);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
    }

    input {
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444;
      background: #000; color: #fff; margin-bottom: 10px; font-size: 16px;
    }

    button {
      padding: 12px 20px; border: none; border-radius: 10px;
      background: var(--platinum-gold); color: #000;
      font-weight: bold; text-transform: uppercase; cursor: pointer;
    }

    .results-list { flex: 1; overflow-y: auto; margin: 10px 0; }

    .song-item {
      display: flex; gap: 10px; padding: 10px; background: rgba(0,0,0,0.3);
      border-radius: 10px; margin-bottom: 8px; align-items: center;
      border: 1px solid transparent;
    }
    .song-item:hover { border-color: #bf953f; }
    .song-item img { width: 70px; border-radius: 5px; }

    /* SCORE SYSTEM */
    #score-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 100;
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }

    .score-circle {
      width: 200px; height: 200px; border-radius: 50%;
      background: var(--platinum-gold); color: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 0 40px #bf953f;
    }
  </style>
</head>
<body class="drawer-open"> <div id="main-wrapper">
  <div id="stage">
    <div id="touch-overlay" onclick="toggleDrawer()"></div>
    <div id="player-wrapper">
      <div id="player"></div>
    </div>
  </div>

  <div id="side-drawer">
    <div class="drawer-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0; background:var(--platinum-gold); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">PLATINUM PRO</h2>
        <button onclick="toggleDrawer()" style="background:#333; color:#fff; font-size:10px;">DONE</button>
      </div>

      <div class="panel">
        <div id="nowPlayingTitle" style="font-weight:bold; color:#bf953f;">Waiting for song...</div>
        <small style="color:#666; text-transform:uppercase;">Now Performing</small>
      </div>

      <div class="panel">
        <input id="searchInput" type="text" placeholder="Search Title or Artist..." />
        <button onclick="searchVideos()" style="width:100%">FIND KARAOKE</button>
      </div>

      <div class="results-list" id="results"></div>

      <h3 style="color:#fcf6ba; font-size:14px; margin:10px 0;">UPCOMING SINGER QUEUE</h3>
      <div id="queue-list" style="max-height:150px; overflow-y:auto;"></div>
      
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="playNextInQueue()" style="flex:1; font-size:11px;">PLAY NEXT</button>
        <button onclick="clearQueue()" style="flex:1; font-size:11px; background:#222; color:#fff;">RESET</button>
      </div>
    </div>
  </div>
</div>

<div id="score-screen">
  <h1 style="color: #bf953f; letter-spacing:4px;">EXCELLENT!</h1>
  <div class="score-circle">
    <div style="font-weight:bold;">SCORE</div>
    <div id="finalScore" style="font-size:70px; font-weight:900;">0</div>
  </div>
  <button onclick="hideScore()" style="margin-top:20px; padding:15px 40px; border-radius:30px;">NEXT SINGER</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const API_KEY = 'YOUR_API_KEY_HERE'; 
  let player;
  let queue = [];

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%', width: '100%', videoId: '',
      playerVars: { 'autoplay': 1, 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
      events: { 'onStateChange': (e) => { if(e.data === 0) triggerScore(); } }
    });
  }

  function toggleDrawer() {
    document.body.classList.toggle('drawer-open');
  }

  async function searchVideos() {
    const query = document.getElementById('searchInput').value;
    if (!query) return;
    const resEl = document.getElementById('results');
    resEl.innerHTML = '<p style="color:#bf953f; text-align:center;">Browsing Library...</p>';

    try {
      const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + " karaoke")}&type=video&videoEmbeddable=true&maxResults=10&key=${API_KEY}`);
      const data = await response.json();
      renderResults(data.items);
    } catch (e) { resEl.innerHTML = '<p>Error.</p>'; }
  }

  function renderResults(items) {
    const resEl = document.getElementById('results');
    resEl.innerHTML = '';
    items.forEach(item => {
      const vId = item.id.videoId;
      const title = item.snippet.title;
      const div = document.createElement('div');
      div.className = 'song-item';
      div.innerHTML = `
        <img src="${item.snippet.thumbnails.default.url}">
        <div style="flex:1">
          <h4 style="margin:0; font-size:13px;">${title}</h4>
          <div style="display:flex; gap:5px; margin-top:8px;">
            <button onclick="playNow('${vId}', '${escape(title)}')" style="font-size:10px; padding:5px;">PLAY</button>
            <button onclick="addToQueue('${vId}', '${escape(title)}')" style="font-size:10px; padding:5px; background:#333; color:#fff;">+ QUEUE</button>
          </div>
        </div>`;
      resEl.appendChild(div);
    });
  }

  function playNow(vId, title) {
    document.getElementById('nowPlayingTitle').textContent = unescape(title);
    player.loadVideoById(vId);
    document.body.classList.remove('drawer-open'); // Video takes full screen back
  }

  function addToQueue(vId, title) {
    const name = prompt("Singer Name:", "Guest");
    if(name) {
      queue.push({ vId, title: unescape(title), name });
      updateQueueUI();
    }
  }

  function updateQueueUI() {
    const qEl = document.getElementById('queue-list');
    qEl.innerHTML = queue.map(i => `<div style="padding:8px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:5px; border-left:3px solid #bf953f; font-size:11px;"><b style="color:#bf953f">${i.name}</b>: ${i.title}</div>`).join('');
  }

  function triggerScore() {
    const score = Math.floor(Math.random() * 15) + 85;
    document.getElementById('finalScore').innerText = score;
    document.getElementById('score-screen').style.display = 'flex';
  }

  function hideScore() {
    document.getElementById('score-screen').style.display = 'none';
    playNextInQueue();
  }

  function playNextInQueue() {
    if(queue.length > 0) {
      const next = queue.shift();
      updateQueueUI();
      playNow(next.vId, next.title);
    }
  }

  function clearQueue() { queue = []; updateQueueUI(); }
  document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') searchVideos(); });
</script>
</body>
</html>
