<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NZM Platinum Videoke</title>
  <style>
    :root {
      --platinum-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --dark-bg: #050505;
      --panel-bg: rgba(20, 20, 20, 0.98);
      --glass-border: 1px solid rgba(212, 175, 55, 0.3);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--dark-bg);
      background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
      color: #fff;
      overflow: hidden;
      height: 100vh;
    }

    /* --- THE LANDSCAPE STAGE --- */
    #player-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #000;
      z-index: 10;
      transition: transform 0.4s ease;
    }

    /* Shrink video slightly to the left when drawer is open */
    body.drawer-open #player-container {
      transform: translateX(-15%);
    }

    #touch-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 15;
      cursor: pointer;
    }

    /* --- RIGHT SIDE DRAWER --- */
    #side-drawer {
      position: fixed;
      top: 0; right: -400px;
      width: 400px; height: 100vh;
      background: var(--panel-bg);
      border-left: var(--glass-border);
      z-index: 100;
      transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-shadow: -10px 0 30px rgba(0,0,0,0.9);
    }

    body.drawer-open #side-drawer { right: 0; }

    .drawer-close-btn {
      width: 100%; margin-bottom: 15px; background: #333; color: #fff; border: 1px solid #bf953f;
    }

    /* --- PLATINUM UI ELEMENTS --- */
    .panel {
      background: rgba(0,0,0,0.4);
      border: var(--glass-border);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
    }

    input {
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444;
      background: #000; color: #fff; margin-bottom: 10px;
    }

    button {
      padding: 10px 20px; border: none; border-radius: 10px;
      background: var(--platinum-gold); color: #000;
      font-weight: bold; text-transform: uppercase; cursor: pointer;
    }

    .results {
      flex: 1; overflow-y: auto; margin: 10px 0;
    }

    .item {
      display: flex; gap: 10px; padding: 10px; background: rgba(255,255,255,0.05);
      border-radius: 10px; margin-bottom: 8px; align-items: center;
    }

    .item img { width: 60px; border-radius: 5px; }
    .item h4 { margin: 0; font-size: 12px; flex: 1; }

    /* --- SCORE OVERLAY --- */
    #score-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 200;
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }

    .score-circle {
      width: 200px; height: 200px; border-radius: 50%;
      background: var(--platinum-gold); color: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 0 40px #bf953f;
    }

    @media (max-width: 500px) {
      #side-drawer { width: 85%; right: -85%; }
    }
  </style>
</head>
<body class="drawer-open"> <div id="player-container">
  <div id="touch-overlay" onclick="toggleDrawer()"></div>
  <div id="player"></div>
</div>

<div id="side-drawer">
  <button class="drawer-close-btn" onclick="toggleDrawer()">CLOSE DRAWER</button>
  
  <div class="panel">
    <div id="nowPlayingTitle" style="font-weight: bold; color: #bf953f; font-size: 14px;">Select a Song</div>
    <div style="font-size: 10px; color: #888;">NOW SINGING</div>
  </div>

  <div class="panel">
    <input id="searchInput" type="text" placeholder="Song Title or Artist..." />
    <button onclick="searchVideos()" style="width: 100%;">SEARCH SONG</button>
  </div>

  <div class="results" id="results"></div>

  <h3 style="color: #fcf6ba; font-size: 14px; margin: 10px 0;">SINGER QUEUE</h3>
  <div id="queue" style="max-height: 200px; overflow-y: auto;"></div>
  
  <div style="display:flex; gap:10px; margin-top:10px;">
    <button onclick="playNextInQueue()" style="flex:1; font-size:11px;">PLAY NEXT</button>
    <button onclick="clearQueue()" style="flex:1; font-size:11px; background:#333; color:#fff;">RESET</button>
  </div>
</div>

<div id="score-screen">
  <h1 style="background: var(--platinum-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 40px;">GREAT!</h1>
  <div class="score-circle">
    <div style="font-weight: bold;">RATING</div>
    <div id="finalScore" style="font-size: 70px; font-weight: 900;">0</div>
  </div>
  <h2 id="ratingText" style="margin-top: 20px;">PROFESSIONAL!</h2>
  <button onclick="hideScore()" style="margin-top: 20px; padding: 15px 40px; border-radius: 30px;">CONTINUE</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const API_KEY = 'AIzaSyBVcJ_KWBBTACy-FeeLAj8sE8ltNGTd8aQ'; 
  let player;
  let queue = [];

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%', width: '100%', videoId: '',
      playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'controls': 0 },
      events: { 'onStateChange': (e) => { if(e.data === 0) showScore(); } }
    });
  }

  function toggleDrawer() {
    document.body.classList.toggle('drawer-open');
  }

  async function searchVideos() {
    const query = document.getElementById('searchInput').value;
    if (!query) return;
    const resEl = document.getElementById('results');
    resEl.innerHTML = '<p style="color:#bf953f; text-align:center;">Searching...</p>';

    try {
      const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + " karaoke")}&type=video&videoEmbeddable=true&maxResults=10&key=${API_KEY}`);
      const data = await response.json();
      renderResults(data.items);
    } catch (e) { resEl.innerHTML = '<p>Error.</p>'; }
  }

  function renderResults(items) {
    const resEl = document.getElementById('results');
    resEl.innerHTML = '';
    items.forEach(item => {
      const vId = item.id.videoId;
      const title = item.snippet.title;
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <img src="${item.snippet.thumbnails.default.url}">
        <div style="flex:1">
          <h4 style="color:#ddd">${title}</h4>
          <div style="display:flex; gap:5px; margin-top:8px;">
            <button onclick="playNow('${vId}', '${escape(title)}')" style="font-size:9px; padding:5px;">PLAY</button>
            <button onclick="addToQueue('${vId}', '${escape(title)}')" style="font-size:9px; padding:5px; background:#444; color:#fff;">QUEUE</button>
          </div>
        </div>`;
      resEl.appendChild(div);
    });
  }

  function playNow(vId, title) {
    document.getElementById('nowPlayingTitle').textContent = unescape(title);
    player.loadVideoById(vId);
    document.body.classList.remove('drawer-open'); // Auto-close to focus on video
  }

  function addToQueue(vId, title) {
    const name = prompt("Singer's Name:", "Guest");
    if(name) {
      queue.push({ vId, title: unescape(title), name });
      updateQueueUI();
    }
  }

  function updateQueueUI() {
    const qEl = document.getElementById('queue');
    qEl.innerHTML = queue.map(i => `
      <div style="padding:8px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:5px; border-left:2px solid #bf953f; font-size:11px;">
        <b style="color:#bf953f">${i.name}</b><br>${i.title}
      </div>`).join('');
  }

  function showScore() {
    const score = Math.floor(Math.random() * 21) + 80;
    document.getElementById('finalScore').innerText = score;
    document.getElementById('score-screen').style.display = 'flex';
  }

  function hideScore() {
    document.getElementById('score-screen').style.display = 'none';
    playNextInQueue();
  }

  function playNextInQueue() {
    if(queue.length > 0) {
      const next = queue.shift();
      updateQueueUI();
      playNow(next.vId, next.title);
    }
  }

  function clearQueue() { queue = []; updateQueueUI(); }
  document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') searchVideos(); });
</script>
</body>
</html>
