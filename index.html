<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NZM Platinum Videoke Pro</title>
  <style>
    :root {
      --platinum-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --dark-bg: #050505;
      --drawer-bg: rgba(15, 15, 15, 0.98);
      --glass-border: 1px solid rgba(212, 175, 55, 0.3);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body, html {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      background: #000;
      font-family: 'Segoe UI', Roboto, sans-serif;
      overflow: hidden; /* Prevents accidental scrolling of the main stage */
      color: #fff;
    }

    /* MAIN WRAPPER - Side by Side Layout */
    #main-wrapper {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* LEFT SIDE: THE VIDEO STAGE */
    #stage {
      flex: 1; /* Default: Takes full width */
      height: 100%;
      background: #000;
      position: relative;
      transition: flex 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* When drawer is open, stage shrinks to half */
    body.drawer-open #stage {
      flex: 0.5; 
    }

    #player-wrapper { width: 100%; height: 100%; pointer-events: none; }

    /* Invisible layer to detect touches to open drawer */
    #touch-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      cursor: pointer;
    }

    /* RIGHT SIDE: THE SCROLLABLE DRAWER */
    #side-drawer {
      width: 0; /* Starts hidden */
      height: 100%;
      background: var(--drawer-bg);
      border-left: var(--glass-border);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body.drawer-open #side-drawer {
      width: 50vw; /* Takes 50% of the screen */
    }

    /* Container inside drawer that handles scrolling */
    .drawer-content {
      min-width: 45vw; /* Prevents squishing during transition */
      height: 100%;
      padding: 20px;
      overflow-y: auto; /* Makes search and queue scrollable */
      display: flex;
      flex-direction: column;
    }

    /* PLATINUM UI STYLES */
    .panel {
      background: rgba(255,255,255,0.05);
      border: var(--glass-border);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
    }

    input {
      width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #444;
      background: #000; color: #fff; margin-bottom: 10px; font-size: 16px;
    }

    button {
      padding: 12px 20px; border: none; border-radius: 10px;
      background: var(--platinum-gold); color: #000;
      font-weight: bold; text-transform: uppercase; cursor: pointer;
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.95); }

    .results-container { flex: 1; margin: 10px 0; }

    .song-item {
      display: flex; gap: 12px; padding: 10px; background: rgba(255,255,255,0.03);
      border-radius: 12px; margin-bottom: 10px; align-items: center;
      border: 1px solid transparent;
    }
    .song-item:hover { border-color: rgba(212, 175, 55, 0.5); }
    .song-item img { width: 80px; border-radius: 8px; }
    .song-item h4 { margin: 0; font-size: 14px; flex: 1; color: #fcf6ba; }

    /* SCORE OVERLAY */
    #score-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.98); z-index: 100;
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }

    .score-circle {
      width: 220px; height: 220px; border-radius: 50%;
      background: var(--platinum-gold); color: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 0 50px #bf953f; margin: 20px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

    @media (max-width: 600px) {
      body.drawer-open #side-drawer { width: 90vw; }
      .drawer-content { min-width: 85vw; }
    }
  </style>
</head>
<body class="drawer-open"> <div id="main-wrapper">
  <div id="stage">
    <div id="touch-overlay" onclick="toggleDrawer()"></div>
    <div id="player-wrapper">
      <div id="player"></div>
    </div>
  </div>

  <div id="side-drawer">
    <div class="drawer-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0; background:var(--platinum-gold); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:900;">PLATINUM PRO</h2>
        <button onclick="toggleDrawer()" style="background:#333; color:#fff; font-size:10px;">CLOSE [X]</button>
      </div>

      <div class="panel">
        <small style="color:#888; text-transform:uppercase; letter-spacing:1px;">Now Singing</small>
        <div id="nowPlayingTitle" style="font-weight:bold; color:#bf953f; font-size:18px; margin-top:5px;">Select a Song</div>
      </div>

      <div class="panel">
        <input id="searchInput" type="text" placeholder="Search Title or Artist..." onkeypress="handleKey(event)"/>
        <button onclick="searchVideos()" style="width:100%">SEARCH LIBRARY</button>
      </div>

      <div class="results-container" id="results">
        </div>

      <h3 style="color:#fcf6ba; font-size:16px; border-bottom:1px solid #333; padding-bottom:10px;">UPCOMING SINGERS</h3>
      <div id="queue-list" style="margin-bottom:20px;"></div>
      
      <div style="display:flex; gap:10px; padding-bottom:20px;">
        <button onclick="playNextInQueue()" style="flex:1; font-size:12px;">PLAY NEXT</button>
        <button onclick="clearQueue()" style="flex:1; font-size:12px; background:#222; color:#fff;">CLEAR ALL</button>
      </div>
    </div>
  </div>
</div>

<div id="score-screen">
  <h1 style="color: #bf953f; letter-spacing:5px; font-size:40px;">FANTASTIC!</h1>
  <div class="score-circle">
    <div style="font-weight:bold; letter-spacing:2px;">RATING</div>
    <div id="finalScore" style="font-size:90px; font-weight:900;">0</div>
  </div>
  <h2 id="ratingText" style="color:#fcf6ba;">PROFESSIONAL!</h2>
  <button onclick="hideScore()" style="margin-top:30px; padding:15px 60px; border-radius:40px; font-size:18px;">NEXT SINGER</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // Replace with your real API Key
  const API_KEY = 'AIzaSyBVcJ_KWBBTACy-FeeLAj8sE8ltNGTd8aQ'; 
  let player;
  let queue = [];

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%', width: '100%', videoId: '',
      playerVars: { 'autoplay': 1, 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
      events: { 'onStateChange': (e) => { if(e.data === 0) triggerScore(); } }
    });
  }

  // --- DRAWER & LANDSCAPE LOGIC ---
  async function toggleDrawer() {
    const isOpen = document.body.classList.toggle('drawer-open');
    
    // If we are closing the drawer to sing, try to force landscape fullscreen
    if (!isOpen) {
      try {
        const doc = document.documentElement;
        if (doc.requestFullscreen) await doc.requestFullscreen();
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape');
        }
      } catch (err) { console.log("Orientation lock requires user gesture or browser support."); }
    }
  }

  function handleKey(e) { if(e.key === 'Enter') searchVideos(); }

  // --- VIDEO SEARCH ---
  async function searchVideos() {
    const query = document.getElementById('searchInput').value;
    if (!query) return;
    const resEl = document.getElementById('results');
    resEl.innerHTML = '<p style="color:#bf953f; text-align:center; padding:20px;">Searching Platinum Library...</p>';

    try {
      const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + " karaoke instrumental")}&type=video&videoEmbeddable=true&maxResults=12&key=${API_KEY}`);
      const data = await response.json();
      renderResults(data.items);
    } catch (e) { resEl.innerHTML = '<p>Search Error. Check API Key.</p>'; }
  }

  function renderResults(items) {
    const resEl = document.getElementById('results');
    resEl.innerHTML = '';
    items.forEach(item => {
      const vId = item.id.videoId;
      const title = item.snippet.title.replace(/karaoke/gi, "").replace(/instrumental/gi, "");
      const div = document.createElement('div');
      div.className = 'song-item';
      div.innerHTML = `
        <img src="${item.snippet.thumbnails.default.url}">
        <div style="flex:1">
          <h4 style="margin:0;">${title}</h4>
          <div style="display:flex; gap:8px; margin-top:10px;">
            <button onclick="playNow('${vId}', '${escape(title)}')" style="font-size:10px; padding:6px 12px;">PLAY NOW</button>
            <button onclick="addToQueue('${vId}', '${escape(title)}')" style="font-size:10px; padding:6px 12px; background:#333; color:#fff;">+ QUEUE</button>
          </div>
        </div>`;
      resEl.appendChild(div);
    });
  }

  // --- PLAYBACK & QUEUE ---
  function playNow(vId, title) {
    document.getElementById('nowPlayingTitle').textContent = unescape(title);
    player.loadVideoById(vId);
    document.body.classList.remove('drawer-open'); // Force video to take full screen
    
    // Attempt landscape lock again on direct play click
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(()=>{});
        if(screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
    }
  }

  function addToQueue(vId, title) {
    const name = prompt("Enter Singer Name:", "Guest");
    if(name) {
      queue.push({ vId, title: unescape(title), name });
      updateQueueUI();
    }
  }

  function updateQueueUI() {
    const qEl = document.getElementById('queue-list');
    if(queue.length === 0) {
        qEl.innerHTML = '<p style="color:#555; font-size:12px;">No singers in line.</p>';
        return;
    }
    qEl.innerHTML = queue.map((i, idx) => `
      <div style="padding:12px; background:rgba(255,255,255,0.05); border-radius:10px; margin-bottom:8px; border-left:4px solid #bf953f; display:flex; justify-content:space-between; align-items:center;">
        <div><b style="color:#bf953f">${i.name}</b><br><span style="font-size:12px;">${i.title}</span></div>
        <small style="color:#444">#${idx+1}</small>
      </div>`).join('');
  }

  // --- SCORE GENERATOR ---
  function triggerScore() {
    // Generate random score between 82 and 100
    const score = Math.floor(Math.random() * (100 - 82 + 1)) + 82;
    document.getElementById('finalScore').innerText = score;
    
    const ratings = ["GOOD!", "GREAT!", "PROFESSIONAL!", "WORLD CLASS!", "PLATINUM!"];
    const rating = ratings[Math.floor(Math.random() * ratings.length)];
    document.getElementById('ratingText').innerText = rating;
    
    document.getElementById('score-screen').style.display = 'flex';
  }

  function hideScore() {
    document.getElementById('score-screen').style.display = 'none';
    playNextInQueue();
  }

  function playNextInQueue() {
    if(queue.length > 0) {
      const next = queue.shift();
      updateQueueUI();
      playNow(next.vId, next.title);
    } else {
      document.body.classList.add('drawer-open'); // Open drawer if no one is next
    }
  }

  function clearQueue() { queue = []; updateQueueUI(); }
</script>
</body>
</html>
