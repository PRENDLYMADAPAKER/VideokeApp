<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZM Platinum Videoke</title>
  <style>
    :root {
      --platinum-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --dark-bg: #050505;
      --panel-bg: rgba(28, 28, 28, 0.8);
      --glass-border: 1px solid rgba(212, 175, 55, 0.3);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--dark-bg);
      background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
      color: #fff;
      min-height: 100vh;
    }

    header {
      padding: 25px;
      text-align: center;
      background: rgba(0,0,0,0.5);
      border-bottom: var(--glass-border);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      background: var(--platinum-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 25px;
      padding: 25px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border: var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Search & Inputs */
    .search-section {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 25px;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #444;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 16px;
      transition: border 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #bf953f;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: var(--platinum-gold);
      color: #000;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      transition: transform 0.2s, opacity 0.2s;
    }

    button:hover { transform: scale(1.02); opacity: 0.9; }

    /* Video Player */
    #player-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
    }

    .now-playing {
      padding: 15px;
      background: rgba(212, 175, 55, 0.1);
      border-radius: 12px;
      border-left: 4px solid #bf953f;
      margin-bottom: 20px;
    }

    /* Results list */
    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 10px;
    }

    .item {
      display: flex;
      gap: 15px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 15px;
      border: 1px solid transparent;
      transition: 0.3s;
    }

    .item:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(212, 175, 55, 0.4);
    }

    .item img {
      width: 110px;
      border-radius: 8px;
    }

    /* Queue Styling */
    .queue-item {
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      border-left: 3px solid #bf953f;
    }

    .singer-name {
      color: #bf953f;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

    @media (max-width: 1000px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Platinum Videoke Pro</h1>
</header>

<div class="container">
  <main>
    <section class="panel">
      <div id="player-container">
        <div id="player"></div>
      </div>

      <div class="now-playing">
        <small style="color: #aaa;">NOW SINGING</small>
        <div id="nowPlayingTitle" style="font-size: 18px; font-weight: bold; margin-top: 5px;">Ready to Sing?</div>
      </div>

      <div class="search-section">
        <div class="input-group">
          <input id="searchInput" type="text" placeholder="Search Song Title or Artist..." />
          <button id="searchBtn">Search</button>
        </div>
      </div>

      <div class="results" id="results"></div>
    </section>
  </main>

  <aside>
    <section class="panel" style="height: 100%;">
      <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px; color: #fcf6ba;">UPCOMING SINGERS</h3>
      <div id="queue" style="margin-top: 15px;"></div>
      
      <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button id="playNextBtn" style="flex: 1; font-size: 12px;">Next Song</button>
        <button id="clearQueueBtn" style="flex: 1; font-size: 12px; background: #333; color: #fff;">Reset</button>
      </div>

      <h3 style="margin-top: 30px; color: #fcf6ba;">SINGER NOTES</h3>
      <div id="lyricsBox" contenteditable="true" style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; font-size: 14px; min-height: 150px; color: #ddd; border: 1px dashed #444;">
        Add reminders or lyrics here...
      </div>
    </section>
  </aside>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // SECURITY NOTE: In a real app, never expose your API key. 
  // Restrict this key in your Google Console to your specific URL.
  const API_KEY = 'YOUR_API_KEY_HERE'; 
  let player;
  let queue = [];

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%',
      width: '100%',
      videoId: '',
      playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1 },
      events: { 'onStateChange': (e) => { if(e.data === 0) playNextInQueue(); } }
    });
  }

  async function searchVideos() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    // Filter to force Karaoke/Instrumental results only
    const enhancedQuery = `${query} karaoke instrumental`;
    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = '<p style="text-align:center; color: #bf953f;">Searching Library...</p>';

    try {
      const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(enhancedQuery)}&type=video&videoEmbeddable=true&maxResults=12&key=${API_KEY}`);
      const data = await response.json();
      renderResults(data.items);
    } catch (error) {
      resultsEl.innerHTML = '<p>Error searching. Check API Key.</p>';
    }
  }

  function renderResults(items) {
    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = '';
    items.forEach(item => {
      const vId = item.id.videoId;
      const title = item.snippet.title.replace("karaoke", "").replace("Karaoke", ""); // Clean title
      
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <img src="${item.snippet.thumbnails.medium.url}">
        <div style="flex:1">
          <h4 style="margin:0; font-size: 14px;">${title}</h4>
          <p style="margin: 5px 0; font-size: 12px; color: #888;">${item.snippet.channelTitle}</p>
          <div style="display:flex; gap: 5px;">
             <button onclick="playNow('${vId}', '${escape(title)}')" style="padding: 5px 10px; font-size: 10px;">Play</button>
             <button onclick="promptQueue('${vId}', '${escape(title)}')" style="padding: 5px 10px; font-size: 10px; background: #444; color: #fff;">+ Queue</button>
          </div>
        </div>
      `;
      resultsEl.appendChild(div);
    });
  }

  function playNow(vId, title) {
    document.getElementById('nowPlayingTitle').textContent = unescape(title);
    player.loadVideoById(vId);
  }

  function promptQueue(vId, title) {
    const singer = prompt("Enter Singer's Name:", "Guest");
    if (singer) {
      queue.push({ vId, title: unescape(title), singer });
      updateQueueUI();
    }
  }

  function updateQueueUI() {
    const qEl = document.getElementById('queue');
    qEl.innerHTML = queue.length === 0 ? '<p style="color:#666">No songs queued.</p>' : '';
    queue.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'queue-item';
      div.innerHTML = `
        <div class="singer-name">${item.singer}</div>
        <div style="font-size: 14px;">${item.title}</div>
      `;
      qEl.appendChild(div);
    });
  }

  function playNextInQueue() {
    if (queue.length > 0) {
      const next = queue.shift();
      updateQueueUI();
      playNow(next.vId, next.title);
    }
  }

  document.getElementById('searchBtn').addEventListener('click', searchVideos);
  document.getElementById('playNextBtn').addEventListener('click', playNextInQueue);
  document.getElementById('clearQueueBtn').addEventListener('click', () => { queue = []; updateQueueUI(); });
  document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') searchVideos(); });
</script>

</body>
</html>
