<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NZM Platinum Videoke Pro</title>
  <style>
    :root {
      --platinum-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --dark-bg: #050505;
      --panel-bg: rgba(25, 25, 25, 0.95);
      --glass-border: 1px solid rgba(212, 175, 55, 0.3);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }

    /* --- VIEW SEPARATION --- */
    .view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; transition: transform 0.5s ease-in-out; z-index: 1; }
    #homepage { background: var(--dark-bg); background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%); display: flex; flex-direction: column; padding: 40px; overflow-y: auto; }
    #stage-view { transform: translateY(100%); z-index: 2; display: flex; }

    body.in-stage #homepage { transform: translateY(-100%); }
    body.in-stage #stage-view { transform: translateY(0); }

    /* --- HOMEPAGE STYLES --- */
    .hero-title { text-align: center; margin-bottom: 30px; }
    .hero-title h1 { background: var(--platinum-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 48px; font-weight: 900; margin: 0; }
    
    .home-grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .search-box { background: var(--panel-bg); border: var(--glass-border); border-radius: 20px; padding: 25px; }

    /* --- STAGE & DRAWER STYLES --- */
    #stage { flex: 1; height: 100%; position: relative; transition: flex 0.5s ease; background: #000; }
    body.drawer-open #stage { flex: 0.75; }
    
    #side-drawer { width: 0; height: 100%; background: rgba(10,10,10,0.98); border-left: var(--glass-border); transition: width 0.5s ease; overflow: hidden; display: flex; flex-direction: column; }
    body.drawer-open #side-drawer { width: 25vw; padding: 15px; }

    /* --- SHARED UI --- */
    .panel { background: rgba(255,255,255,0.05); border: var(--glass-border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; margin-bottom: 10px; }
    button { padding: 12px 25px; border: none; border-radius: 10px; background: var(--platinum-gold); color: #000; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
    button:active { transform: scale(0.95); }
    
    .song-item { display: flex; gap: 12px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px; align-items: center; }
    .song-item img { width: 80px; border-radius: 8px; }
    .song-item h4 { margin: 0; font-size: 14px; flex: 1; color: #fcf6ba; }

    /* --- SCORE --- */
    #score-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .score-circle { width: 200px; height: 200px; border-radius: 50%; background: var(--platinum-gold); color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 50px #bf953f; }

    #touch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
  </style>
</head>
<body>

<div id="homepage" class="view">
  <div class="hero-title">
    <h1>PLATINUM VIDEOKE PRO</h1>
    <p style="color: #888; letter-spacing: 2px;">SELECT YOUR TRACK & GET READY TO SING</p>
  </div>

  <div class="home-grid">
    <div class="search-box">
      <div style="display:flex; gap:10px;">
        <input id="homeSearchInput" type="text" placeholder="Search Song Title or Artist..." onkeypress="if(e.key==='Enter') searchHome()">
        <button onclick="searchHome()">SEARCH</button>
      </div>
      <div id="homeResults" style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        </div>
    </div>

    <div class="search-box">
      <h3 style="margin-top:0; color:#fcf6ba; border-bottom:1px solid #333; padding-bottom:10px;">SINGING NEXT</h3>
      <div id="homeQueue"></div>
      <button onclick="playNextInQueue()" style="width:100%; margin-top:20px;">START PERFORMANCE</button>
    </div>
  </div>
</div>

<div id="stage-view" class="view">
  <div id="stage">
    <div id="touch-overlay" onclick="toggleDrawer()"></div>
    <div id="player" style="width:100%; height:100%;"></div>
  </div>

  <div id="side-drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding-bottom:10px; border-bottom:1px solid #333;">
      <span style="font-weight:bold; color:#bf953f;">STAGE CONTROL</span>
      <button onclick="toggleDrawer()" style="font-size:9px; padding:5px 10px;">DONE</button>
    </div>
    
    <div class="panel">
      <small style="color:#888;">NOW SINGING</small>
      <div id="stageNowPlaying" style="font-size:13px; font-weight:bold; color:#fcf6ba;">-</div>
    </div>

    <input id="stageSearchInput" type="text" placeholder="Quick Search..." style="padding:10px; font-size:13px;">
    <button onclick="searchStage()" style="width:100%; font-size:11px;">SEARCH</button>
    
    <div id="stageResults" style="flex:1; overflow-y:auto; margin-top:10px;"></div>
    
    <button onclick="exitToHome()" style="background:#333; color:#fff; width:100%; margin-top:10px; font-size:10px;">EXIT TO HOME</button>
  </div>
</div>

<div id="score-screen">
  <h1 style="color: #bf953f; font-size: 50px;">GREAT!</h1>
  <div class="score-circle">
    <div style="font-weight:bold;">RATING</div>
    <div id="finalScore" style="font-size:80px; font-weight:900;">0</div>
  </div>
  <button onclick="hideScore()" style="margin-top:30px; padding:15px 50px; border-radius:30px;">CONTINUE</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const API_KEY = 'YOUR_API_KEY_HERE'; 
  let player;
  let queue = [];

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%', width: '100%', videoId: '',
      playerVars: { 'autoplay': 1, 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
      events: { 'onStateChange': (e) => { if(e.data === 0) triggerScore(); } }
    });
  }

  // --- NAVIGATION ---
  function enterStage(vId, title) {
    document.body.classList.add('in-stage');
    document.getElementById('stageNowPlaying').textContent = unescape(title);
    player.loadVideoById(vId);
    
    // Force Landscape Fullscreen
    const doc = document.documentElement;
    if (doc.requestFullscreen) doc.requestFullscreen().catch(()=>{});
    if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
  }

  function exitToHome() {
    document.body.classList.remove('in-stage');
    document.body.classList.remove('drawer-open');
    player.stopVideo();
    if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
  }

  function toggleDrawer() { document.body.classList.toggle('drawer-open'); }

  // --- SEARCH LOGIC ---
  async function searchHome() {
    const q = document.getElementById('homeSearchInput').value;
    const data = await fetchYoutube(q);
    renderResults(data, 'homeResults', true);
  }

  async function searchStage() {
    const q = document.getElementById('stageSearchInput').value;
    const data = await fetchYoutube(q);
    renderResults(data, 'stageResults', false);
  }

  async function fetchYoutube(q) {
    if(!q) return [];
    try {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + " karaoke")}&type=video&maxResults=10&key=${API_KEY}`);
      const data = await res.json();
      return data.items;
    } catch(e) { return []; }
  }

  function renderResults(items, targetId, isHome) {
    const el = document.getElementById(targetId);
    el.innerHTML = items.map(item => `
      <div class="song-item">
        <img src="${item.snippet.thumbnails.default.url}">
        <div style="flex:1">
          <h4 style="font-size:${isHome?'13px':'11px'}">${item.snippet.title.substring(0,40)}...</h4>
          <div style="display:flex; gap:5px; margin-top:5px;">
            <button onclick="enterStage('${item.id.videoId}', '${escape(item.snippet.title)}')" style="font-size:9px; padding:5px;">PLAY</button>
            <button onclick="addToQueue('${item.id.videoId}', '${escape(item.snippet.title)}')" style="font-size:9px; padding:5px; background:#333; color:#fff;">+Q</button>
          </div>
        </div>
      </div>`).join('');
  }

  // --- QUEUE & SCORE ---
  function addToQueue(vId, title) {
    const name = prompt("Singer Name:", "Guest");
    if(name) {
      queue.push({ vId, title: unescape(title), name });
      updateQueueUI();
    }
  }

  function updateQueueUI() {
    const html = queue.map(i => `<div style="padding:10px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:5px; font-size:12px; border-left:3px solid #bf953f;"><b>${i.name}</b>: ${i.title}</div>`).join('');
    document.getElementById('homeQueue').innerHTML = html || '<p style="color:#555">Queue is empty</p>';
  }

  function playNextInQueue() {
    if(queue.length > 0) {
      const next = queue.shift();
      updateQueueUI();
      enterStage(next.vId, next.title);
    } else {
      alert("Please add a song to the queue first!");
    }
  }

  function triggerScore() {
    document.getElementById('finalScore').innerText = Math.floor(Math.random() * 18) + 82;
    document.getElementById('score-screen').style.display = 'flex';
  }

  function hideScore() {
    document.getElementById('score-screen').style.display = 'none';
    if(queue.length > 0) playNextInQueue();
    else exitToHome();
  }
</script>
</body>
</html>
