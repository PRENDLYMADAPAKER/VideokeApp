<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZM Videoke TV Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #08080c;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    /* Premium Metallic Gold Accent gradient */
    .gold-gradient {
      background: linear-gradient(135deg, #e5a93b 0%, #fff2a1 50%, #b88219 100%);
    }

    /* Modern Frosted Dark Glass Panel Styling */
    .panel-glass {
      background: rgba(13, 13, 18, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 1px solid rgba(229, 169, 59, 0.12);
    }

    #player {
      width: 100%;
      height: 100%;
    }

    #qrCode img,
    #qrCode canvas {
      width: 130px !important;
      height: 130px !important;
      border-radius: 8px;
    }

    .tv-layout {
      grid-template-columns: minmax(0, 1fr) 360px;
    }

    /* Custom Premium Scrollbar styling for high-capacity list */
    .premium-scroll::-webkit-scrollbar {
      width: 5px;
    }
    .premium-scroll::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
    }
    .premium-scroll::-webkit-scrollbar-thumb {
      background: rgba(229, 169, 59, 0.25);
      border-radius: 10px;
    }
    .premium-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(229, 169, 59, 0.5);
    }

    /* Fully Furnished Focus Interactivity engine */
    .tv-focusable {
      position: relative;
      outline: none !important;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Focused styling across active remotes/keyboards */
    .tv-focusable:focus,
    .tv-focusable.tv-focused {
      transform: scale(1.025);
      background-color: rgba(229, 169, 59, 0.15) !important;
      border-color: rgba(255, 218, 107, 0.8) !important;
      box-shadow: 0 0 20px rgba(229, 169, 59, 0.25), inset 0 0 0 1px rgba(255, 218, 107, 0.2);
    }

    @media (max-width: 1100px) {
      .tv-layout {
        grid-template-columns: minmax(0, 1fr) 300px;
      }
    }

    /* Deep Optimization for Mobile and Small Tablet Screen Real Estate */
    @media (max-width: 760px) {
      html, body {
        overflow: auto;
      }

      .tv-layout {
        min-height: 100vh;
        display: flex !important;
        flex-direction: column;
      }

      .player-section {
        height: 35vh;
        min-height: 220px;
      }

      .side-panel {
        height: auto !important;
        flex: 1 0 auto;
        border-left: none;
        border-top: 1px solid rgba(229, 169, 59, 0.12);
        padding: 1rem !important;
      }

      /* Login Responsiveness Adjustments */
      .login-card {
        padding: 1.5rem !important;
        width: 88vw !important;
      }
      .login-title {
        font-size: 1.5rem !important;
      }
      .login-logo {
        height: 2.75rem !important;
        width: 2.75rem !important;
        font-size: 1.25rem !important;
        margin-bottom: 0.75rem !important;
      }

      /* Player Idle State Fonts / Logo Responsiveness */
      .player-logo {
        font-size: 3rem !important;
      }
      .player-title {
        font-size: 1.5rem !important;
        letter-spacing: 0.05em !important;
      }
      .player-subtitle {
        font-size: 0.75rem !important;
        letter-spacing: 0.05em !important;
        padding-left: 1rem;
        padding-right: 1rem;
      }
    }
  </style>
</head>
<body class="text-zinc-100 antialiased">

  <!-- Premium Login Overlay -->
  <div id="loginScreen" class="fixed inset-0 z-50 grid place-items-center bg-[#050508]/98 backdrop-blur-md">
    <div class="login-card w-[90vw] max-w-md rounded-2xl border border-amber-500/15 bg-zinc-950/80 p-8 shadow-2xl shadow-amber-500/5 text-center transition-all">
      <div class="login-logo inline-flex h-14 w-14 items-center justify-center rounded-full bg-amber-500/10 mb-4 text-2xl shadow-inner text-amber-400">🎤</div>
      <h1 class="login-title mb-1 text-3xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-400">NZM VIDEOKE</h1>
      <p class="mb-5 text-[11px] font-medium text-zinc-500 tracking-wide uppercase">To Login just add @nzm.local to your Username</p>

      <div class="space-y-2.5 mb-5 text-left">
        <input id="emailInput" class="w-full rounded-xl bg-zinc-900/60 border border-zinc-800 p-3.5 text-sm text-white focus:outline-none focus:border-amber-500/40 transition" placeholder="Email Address" type="email" />
        <input id="passwordInput" class="w-full rounded-xl bg-zinc-900/60 border border-zinc-800 p-3.5 text-sm text-white focus:outline-none focus:border-amber-500/40 transition" placeholder="Password" type="password" />
      </div>

      <button id="loginBtn" class="gold-gradient w-full rounded-xl p-3.5 font-bold text-zinc-950 shadow-lg shadow-amber-500/10 hover:opacity-95 transition active:scale-[0.99]">Login</button>
      <p id="loginError" class="min-h-5 mt-3 text-center text-xs font-semibold text-rose-400"></p>
    </div>
  </div>

  <!-- Primary Interface -->
  <main id="app" class="tv-layout grid h-screen w-full">
    
    <!-- Left Screen Frame: Theater Stage -->
    <section class="player-section relative bg-black shadow-inner">
      <div id="playerShell" class="relative h-full w-full bg-black">
        <div id="player"></div>
        
        <!-- Premium Idle State Layout -->
        <div id="playerPlaceholder" class="absolute inset-0 flex flex-col justify-start pt-[12vh] sm:justify-center sm:pt-0 items-center bg-radial from-zinc-900 to-black text-center p-6 z-10 pointer-events-none">
          <div class="space-y-2 md:space-y-4 max-w-xs sm:max-w-md">
            <div class="player-logo animate-bounce inline-block text-6xl md:text-7xl bg-clip-text drop-shadow-[0_10px_10px_rgba(229,169,59,0.2)]">🎤</div>
            <div class="mx-auto h-px w-20 bg-gradient-to-r from-transparent via-amber-500/40 to-transparent"></div>
            <p class="player-subtitle text-xs md:text-sm font-medium text-amber-200/60 tracking-widest uppercase">Awaiting Song Requests from Remote Control Panel</p>
          </div>
        </div>
      </div>

      <!-- Toast Stream Monitor Status -->
      <div class="pointer-events-none absolute left-4 top-4 md:left-6 md:top-6 flex items-center gap-2 rounded-full bg-zinc-950/80 backdrop-blur-md px-3 py-1.5 md:px-4 md:py-2.5 text-[11px] md:text-xs font-medium text-amber-200/90 shadow-xl border border-zinc-800/80">
        <span class="relative flex h-1.5 w-1.5 md:h-2 md:w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-1.5 w-1.5 md:h-2 md:w-2 bg-emerald-500"></span>
        </span>
        <span id="statusText" class="tracking-wide">System Idle</span>
      </div>
    </section>

    <!-- Right Side Panel Component Framework -->
    <aside id="sidePanel" class="side-panel panel-glass flex h-screen flex-col p-5 overflow-y-auto premium-scroll">
      
      <!-- Brand Segment Header -->
      <div class="mb-4 flex items-center justify-between">
        <div>
          <h1 class="text-lg md:text-xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-zinc-100 to-zinc-400">NZM VIDEOKE</h1>
        </div>
        <div id="roomCodeText" class="text-xs md:text-sm font-black text-amber-400 bg-amber-500/10 border border-amber-500/20 px-2.5 py-1 rounded-md tracking-widest">----</div>
      </div>

      <!-- Action Framework Commands -->
      <div class="space-y-2 mb-3">
        <button id="enableAudioBtn" tabindex="0" data-tv-focusable="true" class="tv-focusable w-full rounded-xl border border-emerald-500/30 bg-emerald-500/10 py-2.5 px-4 text-xs font-bold text-emerald-400 shadow-sm flex items-center justify-center gap-2">
          <span class="text-sm">🔊</span> Enable Media Audio
        </button>
      </div>

      <!-- Modern Micro Console: Now Playing Module -->
      <div class="mb-4 rounded-xl border border-amber-500/10 bg-gradient-to-b from-amber-500/[0.04] to-transparent p-3.5 shadow-sm relative overflow-hidden">
        <div class="absolute top-0 right-0 h-16 w-16 bg-amber-500/[0.02] rounded-full blur-xl"></div>
        <div class="text-[9px] uppercase tracking-widest text-amber-400/70 font-black flex items-center gap-1.5">
          <span class="inline-block w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse"></span> Now Rendering
        </div>
        <div id="nowPlaying" class="mt-1 line-clamp-2 text-xs md:text-sm font-bold text-zinc-100 tracking-tight leading-snug">Nothing playing yet</div>
      </div>

      <!-- Structural High-Capacity Queue Frame Table Container -->
      <div class="flex flex-col flex-1 min-h-[220px] bg-zinc-950/40 rounded-xl border border-zinc-900 p-3">
        <div class="mb-2 flex items-center justify-between px-1">
          <div class="flex items-center gap-2">
            <h2 class="text-[11px] font-black uppercase tracking-wider text-zinc-400">Up Next Queue</h2>
            <span id="queueCount" class="rounded-md bg-zinc-900 border border-zinc-800 px-1.5 py-0.5 text-[9px] text-amber-400 font-bold">0</span>
          </div>
        </div>

        <!-- High-Capacity Scrollable Area -->
        <div id="queueList" class="flex-1 overflow-y-auto premium-scroll pr-1 space-y-1.5 max-h-[38vh] md:max-h-none">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="border-b border-zinc-900 text-[9px] text-zinc-600 uppercase tracking-widest font-bold">
                <th class="pb-1.5 pl-2 w-10">Pos</th>
                <th class="pb-1.5 w-14 text-center">Art</th>
                <th class="pb-1.5 pl-2">Title</th>
              </tr>
            </thead>
            <tbody id="queueTableBody" class="divide-y divide-zinc-950">
              <tr>
                <td colspan="3" class="py-12 text-center text-xs font-medium text-zinc-600">No songs currently lined up</td>
              </tr>
            </tbody>
          </table>
        </div>
        
      </div>

      <!-- Utility Control Panel Base Footer -->
      <div class="mt-3 pt-0.5 grid grid-cols-2 gap-2">
        <button id="toggleQrBtn" tabindex="0" data-tv-focusable="true" class="tv-focusable w-full rounded-xl border border-zinc-800 bg-zinc-900/50 py-2.5 text-[11px] font-bold text-zinc-300 shadow-sm transition">
          Open QR Code to Connect
        </button>
        <button id="newRoomBtn" tabindex="0" data-tv-focusable="true" class="tv-focusable w-full rounded-xl border border-zinc-800 bg-zinc-900/50 py-2.5 text-[11px] font-bold text-zinc-400 shadow-sm transition">
          Change Room
        </button>
      </div>

      <!-- QR Flyout Deck Card Container -->
      <div id="qrCardWrapper" class="hidden mt-3 rounded-xl border border-zinc-800 bg-white p-3 mx-auto shadow-2xl transition">
        <div id="qrCode" class="bg-white"></div>
      </div>
    </aside>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getDatabase,
      ref,
      onChildAdded,
      onValue,
      set,
      remove,
      get,
      update,
      off
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCFUZe8BZKPzU5E_es0Gv5xsqkliB3tTes",
      authDomain: "admin-panel-87530.firebaseapp.com",
      databaseURL: "https://admin-panel-87530-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "admin-panel-87530",
      storageBucket: "admin-panel-87530.firebasestorage.app",
      messagingSenderId: "1065643470010",
      appId: "1:1065643470010:web:ea79e85fef283dfb05a683",
      measurementId: "G-YSCLM1KL0Z"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const params = new URLSearchParams(location.search);
    let roomId = params.get("room") || localStorage.getItem("nzmRoom") || makeRoomId();

    let currentUser = null;
    let player = null;
    let playerReady = false;
    let hasLoadedVideo = false;
    let currentVideoId = null;
    let audioUnlocked = localStorage.getItem("nzmAudioUnlocked") === "1";
    let queueListenerRef = null;
    let commandsListenerRef = null;
    const processedCommands = new Set();
    let tvQueueItems = [];
    let selectedQueueIndex = 0;
    let sidePanelFocusIndex = 0;
    let isQrVisible = false;

    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0,
          modestbranding: 1,
          playsinline: 1,
          enablejsapi: 1
        },
        events: {
          onReady: () => {
            playerReady = true;
            updateEnableAudioButton();
            setStatus(audioUnlocked ? "Ready. Sound Linked." : "Ready. Click Audio Enable Pin.");
          },
          onStateChange: (event) => {
            if (event.data === YT.PlayerState.ENDED) {
              playNextSong();
            }
          },
          onError: () => {
            setStatus("Format stream missing error. Skip triggered.");
          }
        }
      });
    };

    function loadYouTubeIframeApi() {
      if (window.YT && window.YT.Player) {
        window.onYouTubeIframeAPIReady();
        return;
      }
      const tag = document.createElement("script");
      tag.src = "https://youtube.com/iframe_api";
      document.body.appendChild(tag);
    }
    loadYouTubeIframeApi();

    function makeRoomId() {
      return Math.random().toString(36).slice(2, 8).toUpperCase();
    }

    function userRoomPath(path = "") {
      if (!currentUser) throw new Error("No clean pipeline instance auth context.");
      return `users/${currentUser.uid}/rooms/${roomId}${path ? "/" + path : ""}`;
    }

    function roomRef(path = "") {
      return ref(db, userRoomPath(path));
    }

    function setStatus(text) {
      document.getElementById("statusText").textContent = text;
    }

    function updateEnableAudioButton() {
      const btn = document.getElementById("enableAudioBtn");
      if (!btn) return;

      if (audioUnlocked) {
        btn.textContent = "Enable Audio";
        btn.className = "w-full rounded-xl bg-emerald-500/10 border border-emerald-500/20 py-2.5 px-4 text-xs font-bold text-emerald-400 transition cursor-default";
      } else {
        btn.textContent = "Audio Enabled";
        btn.className = "tv-focusable w-full rounded-xl bg-emerald-600 border border-emerald-500/40 py-2.5 px-4 text-xs font-bold text-white shadow-md cursor-pointer";
      }
    }

    function markAudioUnlocked() {
      audioUnlocked = true;
      localStorage.setItem("nzmAudioUnlocked", "1");
      updateEnableAudioButton();
    }

    function requestAudioUnlock() {
      if (!playerReady || !player) {
        setStatus("Waiting on player initialization framework...");
        return;
      }
      try {
        markAudioUnlocked();
        player.unMute();
        player.setVolume(85);

        if (hasLoadedVideo && currentVideoId) {
          player.playVideo();
          setStatus("Theater Active. Pipeline linked.");
        } else {
          setStatus("Sound Active. Standby for remote input request.");
        }
      } catch (error) {
        console.warn(error);
        setStatus("Handshake layer interface blocked.");
      }
    }

    document.getElementById("enableAudioBtn").addEventListener("click", requestAudioUnlock);

    const toggleQrBtn = document.getElementById("toggleQrBtn");
    toggleQrBtn.addEventListener("click", () => {
      isQrVisible = !isQrVisible;
      const card = document.getElementById("qrCardWrapper");
      if (isQrVisible) {
        card.classList.remove("hidden");
        toggleQrBtn.textContent = "Close QR Code";
      } else {
        card.classList.add("hidden");
        toggleQrBtn.textContent = "Open QR Code";
      }
    });

    function startPlaybackWithBestAudio() {
      if (!playerReady || !player) return;
      try {
        if (audioUnlocked) {
          player.unMute();
        } else {
          player.mute();
        }
        player.playVideo();
        setStatus(audioUnlocked ? "Streaming Active" : "Streaming Muted (Awaiting Unmute Control)");
      } catch (error) {
        console.warn(error);
      }
    }

    function escapeHtml(value = "") {
      return String(value).replace(/[&<>'"]/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
      }[c]));
    }

    function thumbnail(videoId) {
      return `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
    }

    async function loginOrCreate() {
      const email = document.getElementById("emailInput").value.trim();
      const password = document.getElementById("passwordInput").value;
      const err = document.getElementById("loginError");
      err.textContent = "";

      if (!email || !password) {
        err.textContent = "Parameters missing fields requirements.";
        return;
      }
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (loginError) {
        try {
          await createUserWithEmailAndPassword(auth, email, password);
        } catch (createError) {
          err.textContent = createError.message;
        }
      }
    }

    document.getElementById("loginBtn").addEventListener("click", loginOrCreate);
    document.getElementById("passwordInput").addEventListener("keydown", e => {
      if (e.key === "Enter") loginOrCreate();
    });

    document.getElementById("newRoomBtn").addEventListener("click", async () => {
      roomId = makeRoomId();
      localStorage.setItem("nzmRoom", roomId);
      history.replaceState(null, "", `?room=${encodeURIComponent(roomId)}`);
      processedCommands.clear();
      if (currentUser) {
        stopListeners();
        await initRoom();
      }
    });

    onAuthStateChanged(auth, async user => {
      if (!user) return;
      currentUser = user;
      document.getElementById("loginScreen").style.display = "none";
      localStorage.setItem("nzmRoom", roomId);
      history.replaceState(null, "", `?room=${encodeURIComponent(roomId)}`);
      await initRoom();
    });

    async function initRoom() {
      await update(roomRef(), {
        roomId,
        ownerUid: currentUser.uid,
        updatedAt: Date.now()
      });
      renderQR();
      listenQueue();
      listenCommands();
      focusFirstAvailableTvControl();
      setStatus("Theater Ready. Connect Remote.");
    }

    function renderQR() {
      const remoteUrl = `https://videokeremote.vercel.app/?room=${encodeURIComponent(roomId)}&owner=${encodeURIComponent(currentUser.uid)}`;
      const roomCodeText = document.getElementById("roomCodeText");
      if (roomCodeText) roomCodeText.textContent = roomId;

      document.getElementById("qrCode").innerHTML = "";
      new QRCode(document.getElementById("qrCode"), {
        text: remoteUrl,
        width: 130,
        height: 130,
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    function stopListeners() {
      if (queueListenerRef) { off(queueListenerRef); queueListenerRef = null; }
      if (commandsListenerRef) { off(commandsListenerRef); commandsListenerRef = null; }
    }

    function listenQueue() {
      queueListenerRef = roomRef("queue");
      onValue(queueListenerRef, snapshot => {
        const items = [];
        snapshot.forEach(child => {
          items.push({ key: child.key, ...child.val() });
        });
        items.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
        renderQueue(items);
      });
    }

    function getTvFocusableElements() {
      return [...document.querySelectorAll("[data-tv-focusable='true']")]
        .filter(el => !el.disabled && el.offsetParent !== null && el.style.display !== "none");
    }

    function syncTvFocusClass() {
      document.querySelectorAll(".tv-focused").forEach(el => el.classList.remove("tv-focused"));
      const active = document.activeElement;
      if (active && active.matches && active.matches("[data-tv-focusable='true']")) {
        active.classList.add("tv-focused");
      }
    }

    function focusTvElement(index = 0) {
      const focusables = getTvFocusableElements();
      if (!focusables.length) return;
      sidePanelFocusIndex = Math.max(0, Math.min(index, focusables.length - 1));
      const target = focusables[sidePanelFocusIndex];
      target.focus({ preventScroll: true });
      target.scrollIntoView({ block: "nearest", behavior: "smooth" });
      syncTvFocusClass();
    }

    function moveSidePanelFocus(direction) {
      const focusables = getTvFocusableElements();
      if (!focusables.length) return;
      const activeIndex = focusables.indexOf(document.activeElement);
      const startIndex = activeIndex >= 0 ? activeIndex : sidePanelFocusIndex;
      const nextIndex = Math.max(0, Math.min(startIndex + direction, focusables.length - 1));
      focusTvElement(nextIndex);
    }

    function focusFirstAvailableTvControl() {
      requestAnimationFrame(() => {
        const preferred = document.getElementById("enableAudioBtn");
        if (preferred && preferred.offsetParent !== null && preferred.style.display !== "none") {
          preferred.focus({ preventScroll: true });
          syncTvFocusClass();
          return;
        }
        focusTvElement(0);
      });
    }

    function renderQueue(items) {
      tvQueueItems = items;
      selectedQueueIndex = Math.min(selectedQueueIndex, Math.max(items.length - 1, 0));
      document.getElementById("queueCount").textContent = items.length;
      const tbody = document.getElementById("queueTableBody");

      if (!items.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="3" class="py-12 text-center text-xs font-medium text-zinc-600">No songs currently lined up</td>
          </tr>`;
        return;
      }

      tbody.innerHTML = items.map((item, index) => `
        <tr
          class="queue-row-item tv-focusable border-b border-zinc-900/60 bg-zinc-900/10 hover:bg-zinc-900/30 transition duration-150 rounded-lg cursor-pointer ${index === selectedQueueIndex ? "is-selected" : ""}"
          tabindex="0"
          role="button"
          data-tv-focusable="true"
          data-queue-index="${index}"
        >
          <td class="py-3 pl-3 font-black text-xs text-amber-500/70">#${String(index + 1).padStart(2, '0')}</td>
          <td class="py-2 text-center">
            <img class="h-8 w-12 mx-auto rounded object-cover border border-zinc-800 shadow-sm" src="${item.thumbnail || thumbnail(item.videoId)}" />
          </td>
          <td class="py-2 pl-3 pr-2 min-w-0">
            <div class="truncate text-xs font-bold text-zinc-100 tracking-tight">${escapeHtml(item.title || item.videoId)}</div>
            <div class="truncate text-[10px] text-zinc-500 font-semibold uppercase tracking-wider mt-0.5">${escapeHtml(item.singer || "Guest Singer")}</div>
          </td>
        </tr>
      `).join("");

      document.querySelectorAll(".queue-row-item").forEach(row => {
        row.addEventListener("focus", () => {
          selectedQueueIndex = Number(row.dataset.queueIndex || 0);
          syncTvFocusClass();
        });
        row.addEventListener("blur", syncTvFocusClass);
        row.addEventListener("click", async () => {
          selectedQueueIndex = Number(row.dataset.queueIndex || 0);
          await playSelectedQueueSong();
        });
      });
      syncTvFocusClass();
    }

    async function playSelectedQueueSong() {
      const item = tvQueueItems[selectedQueueIndex];
      if (!item) return;
      await playSpecificSong(item, item.key);
    }

    async function removeSelectedQueueSong() {
      const item = tvQueueItems[selectedQueueIndex];
      if (!item || !item.key) return;
      await remove(roomRef(`queue/${item.key}`));
      selectedQueueIndex = Math.max(0, selectedQueueIndex - 1);
      setStatus("Dropped targeted item request.");
    }

    function handleTvQueueKeys(event) {
      const key = event.key;
      const remoteOkKeys = ["Enter", " ", "Spacebar", "OK", "Select"];
      const remoteBackKeys = ["Backspace", "Delete", "BrowserBack", "Escape"];

      if (!["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", ...remoteOkKeys, ...remoteBackKeys].includes(key)) return;

      const active = document.activeElement;
      const activeIsQueueRow = active && active.classList && active.classList.contains("queue-row-item");

      if (key === "ArrowUp") {
        event.preventDefault();
        moveSidePanelFocus(-1);
        return;
      }
      if (key === "ArrowDown") {
        event.preventDefault();
        moveSidePanelFocus(1);
        return;
      }
      if (key === "ArrowLeft" || key === "ArrowRight") {
        event.preventDefault();
        return;
      }
      if (remoteOkKeys.includes(key)) {
        if (!active) return;
        event.preventDefault();
        if (activeIsQueueRow) {
          selectedQueueIndex = Number(active.dataset.queueIndex || 0);
          playSelectedQueueSong();
          return;
        }
        active.click();
        return;
      }
      if (remoteBackKeys.includes(key)) {
        if (!activeIsQueueRow) return;
        event.preventDefault();
        removeSelectedQueueSong();
      }
    }

    document.addEventListener("keydown", handleTvQueueKeys);
    document.addEventListener("focusin", syncTvFocusClass);
    document.addEventListener("focusout", syncTvFocusClass);

    function listenCommands() {
      commandsListenerRef = roomRef("commands");
      onChildAdded(commandsListenerRef, async snapshot => {
        if (processedCommands.has(snapshot.key)) return;
        processedCommands.add(snapshot.key);

        const cmd = snapshot.val();
        if (!cmd || !cmd.type) return;

        if (cmd.type === "play") { await handleRemotePlay(); return; }
        if (cmd.type === "pause") { pauseCurrentSong(); return; }
        if (cmd.type === "next") { await playNextSong(); return; }
        if (cmd.type === "replay") { replayCurrentSong(); return; }
        if (cmd.type === "volume") { setVolumeFromRemote(cmd.value); return; }
        if (cmd.type === "playVideo" && cmd.videoId) { await playSpecificSong(cmd, null); return; }
      });
    }

    async function handleRemotePlay() {
      if (!playerReady) return;
      if (hasLoadedVideo && currentVideoId) {
        forcePlayCurrentVideo();
        return;
      }
      await playNextSong();
    }

    function forcePlayCurrentVideo() {
      if (!playerReady || !player) return;
      startPlaybackWithBestAudio();
    }

    function pauseCurrentSong() {
      if (!playerReady || !player || !hasLoadedVideo) return;
      try { player.pauseVideo(); setStatus("Paused"); } catch (error) { console.warn(error); }
    }

    function replayCurrentSong() {
      if (!playerReady || !player || !hasLoadedVideo) return;
      try { player.seekTo(0, true); forcePlayCurrentVideo(); setStatus("Replay Core Track"); } catch (error) { console.warn(error); }
    }

    function setVolumeFromRemote(value) {
      if (!playerReady || !player) return;
      const volume = Math.max(0, Math.min(100, Number(value || 80)));
      try { player.setVolume(volume); setStatus(`Volume Master ${volume}%`); } catch (error) { console.warn(error); }
    }

    async function playNextSong() {
      const snap = await get(roomRef("queue"));
      const items = [];
      snap.forEach(child => { items.push({ key: child.key, ...child.val() }); });
      items.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

      if (!items.length) {
        setStatus("Queue Exhausted");
        return;
      }
      await playSpecificSong(items[0], items[0].key);
    }

    async function playSpecificSong(song, queueKey = null) {
      if (!song || !song.videoId) return;
      hasLoadedVideo = true;
      currentVideoId = song.videoId;

      const placeholder = document.getElementById("playerPlaceholder");
      if (placeholder) placeholder.style.display = "none";

      document.getElementById("nowPlaying").textContent = song.title || song.videoId;
      setStatus("Buffering Layer Video Stream...");

      if (playerReady && player) {
        try {
          if (audioUnlocked) { player.unMute(); } else { player.mute(); }
          player.loadVideoById({ videoId: song.videoId, startSeconds: 0 });
        } catch (error) {
          console.warn(error);
        }
        setTimeout(startPlaybackWithBestAudio, 250);
        setTimeout(startPlaybackWithBestAudio, 1000);
      }
      await set(roomRef("nowPlaying"), { ...song, startedAt: Date.now() });
      if (queueKey) { await remove(roomRef(`queue/${queueKey}`)); }
    }
  </script>
</body>
</html>
