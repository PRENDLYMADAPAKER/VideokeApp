<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NZM Platinum Videoke</title>
  <style>
    :root {
      --platinum-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --dark-bg: #050505;
      --panel-bg: rgba(28, 28, 28, 0.95);
      --glass-border: 1px solid rgba(212, 175, 55, 0.3);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--dark-bg);
      color: #fff;
      overflow-x: hidden;
    }

    /* --- THE STAGE (VIDEO PLAYER) --- */
    #player-container {
      position: relative; /* Normal position at start */
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      transition: all 0.5s ease;
      z-index: 100;
    }

    /* FULLSCREEN CLASS (Triggered on Play) */
    #player-container.fullscreen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }

    /* HALFSCREEN CLASS (Triggered on Touch while playing) */
    #player-container.halfscreen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 50vh;
      border-bottom: var(--glass-border);
    }

    #touch-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 110;
      display: none; /* Only active during playback */
    }

    /* --- UI LAYOUT --- */
    .container {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 25px;
      padding: 20px;
      max-width: 1600px;
      margin: 0 auto;
      transition: transform 0.5s ease;
    }

    /* Move UI when video is half-screen */
    body.is-singing .container {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 50vh;
      overflow-y: auto;
      background: var(--dark-bg);
      padding: 10px;
      z-index: 90;
    }

    .panel {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border: var(--glass-border);
      border-radius: 20px;
      padding: 20px;
    }

    input {
      flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #444;
      background: rgba(0,0,0,0.6); color: #fff;
    }

    button {
      padding: 12px 24px; border: none; border-radius: 12px;
      background: var(--platinum-gold); color: #000; font-weight: bold; cursor: pointer;
    }

    .done-btn { display: none; width: 100%; margin-bottom: 10px; }

    /* --- SCORE SCREEN --- */
    #score-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 200;
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }

    .score-circle {
      width: 200px; height: 200px; border-radius: 50%;
      background: var(--platinum-gold); color: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 0 40px #bf953f; margin: 20px;
    }

    .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-top: 15px; }
    .item { display: flex; gap: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 12px; align-items: center; }
    .item img { width: 70px; border-radius: 5px; }

    @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header id="app-header">
  <h1>Platinum Videoke Pro</h1>
</header>

<div id="player-container">
  <div id="touch-overlay" onclick="minimizeVideo()"></div>
  <div id="player"></div>
</div>

<div class="container">
  <button class="done-btn" id="doneBtn" onclick="maximizeVideo()">DONE SELECTING (CLOSE)</button>
  
  <main>
    <section class="panel">
      <div class="now-playing">
        <small style="color: #aaa;">NOW SINGING</small>
        <div id="nowPlayingTitle" style="font-size: 18px; font-weight: bold; margin-top: 5px;">Ready to Sing?</div>
      </div>

      <div class="search-section">
        <div style="display:flex; gap:10px;">
          <input id="searchInput" type="text" placeholder="Search Song Title or Artist..." />
          <button onclick="searchVideos()">Search</button>
        </div>
      </div>

      <div class="results" id="results"></div>
    </section>
  </main>

  <aside>
    <section class="panel">
      <h3 style="color: #fcf6ba; margin-top:0;">UPCOMING SINGERS</h3>
      <div id="queue"></div>
      <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button onclick="playNextInQueue()" style="flex: 1; font-size: 12px;">Next Song</button>
        <button onclick="clearQueue()" style="flex: 1; font-size: 12px; background: #333; color: #fff;">Reset</button>
      </div>
    </section>
  </aside>
</div>

<div id="score-screen">
  <div class="score-circle">
    <div style="font-weight: bold;">YOUR SCORE</div>
    <div id="finalScore" style="font-size: 70px; font-weight: 900;">0</div>
  </div>
  <h2 id="ratingText">PROFESSIONAL!</h2>
  <button onclick="hideScore()" style="margin-top: 20px; padding: 15px 40px; border-radius: 30px;">CONTINUE</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const API_KEY = 'AIzaSyBVcJ_KWBBTACy-FeeLAj8sE8ltNGTd8aQ'; 
  let player;
  let queue = [];

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%', width: '100%', videoId: '',
      playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'controls': 0 },
      events: { 'onStateChange': (e) => { if(e.data === 0) showScore(); } }
    });
  }

  // --- STAGE CONTROL ---
  function maximizeVideo() {
    const pc = document.getElementById('player-container');
    pc.className = 'fullscreen';
    document.getElementById('touch-overlay').style.display = 'block';
    document.getElementById('doneBtn').style.display = 'none';
  }

  function minimizeVideo() {
    const pc = document.getElementById('player-container');
    pc.className = 'halfscreen';
    document.body.classList.add('is-singing');
    document.getElementById('doneBtn').style.display = 'block';
  }

  function resetToNormal() {
    const pc = document.getElementById('player-container');
    pc.className = '';
    document.body.classList.remove('is-singing');
    document.getElementById('touch-overlay').style.display = 'none';
    document.getElementById('doneBtn').style.display = 'none';
  }

  // --- CORE FUNCTIONS ---
  async function searchVideos() {
    const query = document.getElementById('searchInput').value;
    if (!query) return;
    const resEl = document.getElementById('results');
    resEl.innerHTML = '<p>Searching...</p>';

    try {
      const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + " karaoke")}&type=video&videoEmbeddable=true&maxResults=10&key=${API_KEY}`);
      const data = await response.json();
      renderResults(data.items);
    } catch (e) { resEl.innerHTML = '<p>Error.</p>'; }
  }

  function renderResults(items) {
    const resEl = document.getElementById('results');
    resEl.innerHTML = '';
    items.forEach(item => {
      const vId = item.id.videoId;
      const title = item.snippet.title;
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <img src="${item.snippet.thumbnails.default.url}">
        <div style="flex:1">
          <h4 style="font-size:13px; margin:0;">${title}</h4>
          <div style="display:flex; gap:5px; margin-top:5px;">
            <button onclick="playNow('${vId}', '${escape(title)}')" style="font-size:10px; padding:5px 10px;">PLAY</button>
            <button onclick="promptQueue('${vId}', '${escape(title)}')" style="font-size:10px; padding:5px 10px; background:#333; color:#fff;">QUEUE</button>
          </div>
        </div>`;
      resEl.appendChild(div);
    });
  }

  function playNow(vId, title) {
    document.getElementById('nowPlayingTitle').textContent = unescape(title);
    player.loadVideoById(vId);
    maximizeVideo(); // GO FULLSCREEN ONLY WHEN PLAYING
  }

  function promptQueue(vId, title) {
    const singer = prompt("Singer Name:", "Guest");
    if(singer) {
      queue.push({ vId, title: unescape(title), singer });
      updateQueueUI();
    }
  }

  function updateQueueUI() {
    const qEl = document.getElementById('queue');
    qEl.innerHTML = queue.map(i => `<div style="padding:10px; background:rgba(0,0,0,0.2); border-radius:8px; margin-bottom:5px; border-left:2px solid #bf953f;"><small>${i.singer}</small><br>${i.title}</div>`).join('');
  }

  function showScore() {
    const score = Math.floor(Math.random() * 21) + 80;
    document.getElementById('finalScore').innerText = score;
    document.getElementById('score-screen').style.display = 'flex';
  }

  function hideScore() {
    document.getElementById('score-screen').style.display = 'none';
    if(queue.length > 0) {
      const next = queue.shift();
      updateQueueUI();
      playNow(next.vId, next.title);
    } else {
      resetToNormal();
    }
  }

  function playNextInQueue() { if(queue.length > 0) showScore(); }
  function clearQueue() { queue = []; updateQueueUI(); }
</script>
</body>
</html>
