<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NZM Platinum Videoke</title>
  <style>
    :root {
      --platinum-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --dark-bg: #050505;
      --panel-bg: rgba(28, 28, 28, 0.95);
      --glass-border: 1px solid rgba(212, 175, 55, 0.3);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--dark-bg);
      background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
      color: #fff;
      min-height: 100vh;
      overflow: hidden; /* Prevent background scroll */
    }

    header {
      padding: 25px;
      text-align: center;
      background: rgba(0,0,0,0.5);
      border-bottom: var(--glass-border);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      background: var(--platinum-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
    }

    /* --- STAGE MODE ADDITIONS --- */
    #player-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #000;
      z-index: 100;
      transition: height 0.5s ease;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
    }

    #player-container.minimized {
      height: 50vh;
      border-bottom: var(--glass-border);
    }

    #touch-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 110;
      cursor: pointer;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 25px;
      padding: 25px;
      max-width: 1600px;
      margin: 0 auto;
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      height: 50vh;
      background: var(--dark-bg);
      z-index: 90;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.5s ease;
    }

    body.searching .container {
      transform: translateY(0);
    }

    /* --- ORIGINAL PANEL STYLING --- */
    .panel {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border: var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .search-section { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
    .input-group { display: flex; gap: 10px; }

    input {
      flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #444;
      background: rgba(0,0,0,0.6); color: #fff; font-size: 16px;
    }

    button {
      padding: 12px 24px; border: none; border-radius: 12px;
      background: var(--platinum-gold); color: #000;
      font-weight: bold; text-transform: uppercase; cursor: pointer;
    }

    .done-btn {
      grid-column: 1 / -1;
      margin-bottom: 10px;
      background: #333;
      color: #fff;
      border: 1px solid #bf953f;
    }

    .now-playing {
      padding: 15px; background: rgba(212, 175, 55, 0.1);
      border-radius: 12px; border-left: 4px solid #bf953f; margin-bottom: 20px;
    }

    .results {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px; max-height: 300px; overflow-y: auto;
    }

    .item {
      display: flex; gap: 15px; padding: 12px; background: rgba(255,255,255,0.03);
      border-radius: 15px; align-items: center;
    }

    .item img { width: 80px; border-radius: 8px; }

    /* --- SCORE SCREEN --- */
    #score-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 200;
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }

    .score-circle {
      width: 200px; height: 200px; border-radius: 50%;
      background: var(--platinum-gold); color: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 0 40px #bf953f; margin: 20px;
    }

    .queue-item {
      padding: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.3);
      border-radius: 10px; border-left: 3px solid #bf953f;
    }

    .singer-name { color: #bf953f; font-size: 12px; font-weight: bold; }

    @media (max-width: 1000px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="player-container">
  <div id="touch-overlay"></div>
  <div id="player"></div>
</div>

<div class="container" id="ui-container">
  <button class="done-btn" onclick="closeDrawer()">DONE SELECTING (CLOSE)</button>
  
  <main>
    <section class="panel">
      <div class="now-playing">
        <small style="color: #aaa;">NOW SINGING</small>
        <div id="nowPlayingTitle" style="font-size: 18px; font-weight: bold; margin-top: 5px;">Ready to Sing?</div>
      </div>

      <div class="search-section">
        <div class="input-group">
          <input id="searchInput" type="text" placeholder="Search Song Title or Artist..." />
          <button id="searchBtn">Search</button>
        </div>
      </div>

      <div class="results" id="results"></div>
    </section>
  </main>

  <aside>
    <section class="panel">
      <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px; color: #fcf6ba;">UPCOMING SINGERS</h3>
      <div id="queue"></div>
      
      <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button id="playNextBtn" style="flex: 1; font-size: 12px;">Next Song</button>
        <button id="clearQueueBtn" style="flex: 1; font-size: 12px; background: #333; color: #fff;">Reset</button>
      </div>
    </section>
  </aside>
</div>

<div id="score-screen">
  <h1 style="color: #bf953f; letter-spacing: 5px;">WELL DONE!</h1>
  <div class="score-circle">
    <div style="font-weight: bold;">YOUR SCORE</div>
    <div id="finalScore" style="font-size: 70px; font-weight: 900;">0</div>
  </div>
  <h2 id="ratingText">PROFESSIONAL!</h2>
  <button onclick="hideScore()" style="margin-top: 20px; padding: 15px 40px; border-radius: 30px;">NEXT SINGER</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const API_KEY = 'AIzaSyBVcJ_KWBBTACy-FeeLAj8sE8ltNGTd8aQ'; 
  let player;
  let queue = [];

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%', width: '100%', videoId: '',
      playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'controls': 0 },
      events: { 'onStateChange': (e) => { if(e.data === 0) showScore(); } }
    });
  }

  // --- STAGE LOGIC ---
  const playerCont = document.getElementById('player-container');
  const touchOverlay = document.getElementById('touch-overlay');

  touchOverlay.addEventListener('click', () => {
    playerCont.classList.add('minimized');
    document.body.classList.add('searching');
  });

  function closeDrawer() {
    playerCont.classList.remove('minimized');
    document.body.classList.remove('searching');
  }

  async function searchVideos() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    const enhancedQuery = `${query} karaoke instrumental`;
    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = '<p style="text-align:center; color: #bf953f;">Searching Library...</p>';

    try {
      const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(enhancedQuery)}&type=video&videoEmbeddable=true&maxResults=12&key=${API_KEY}`);
      const data = await response.json();
      renderResults(data.items);
    } catch (error) { resultsEl.innerHTML = '<p>Error.</p>'; }
  }

  function renderResults(items) {
    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = '';
    items.forEach(item => {
      const vId = item.id.videoId;
      const title = item.snippet.title.replace("karaoke", "").replace("Karaoke", "");
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <img src="${item.snippet.thumbnails.medium.url}">
        <div style="flex:1">
          <h4 style="margin:0; font-size: 14px;">${title}</h4>
          <div style="display:flex; gap: 5px; margin-top: 8px;">
             <button onclick="playNow('${vId}', '${escape(title)}')" style="padding: 5px 10px; font-size: 10px;">Play</button>
             <button onclick="promptQueue('${vId}', '${escape(title)}')" style="padding: 5px 10px; font-size: 10px; background: #444; color: #fff;">Queue</button>
          </div>
        </div>
      `;
      resultsEl.appendChild(div);
    });
  }

  function playNow(vId, title) {
    document.getElementById('nowPlayingTitle').textContent = unescape(title);
    player.loadVideoById(vId);
    closeDrawer();
  }

  function promptQueue(vId, title) {
    const singer = prompt("Enter Singer's Name:", "Guest");
    if (singer) {
      queue.push({ vId, title: unescape(title), singer });
      updateQueueUI();
    }
  }

  function updateQueueUI() {
    const qEl = document.getElementById('queue');
    qEl.innerHTML = queue.length === 0 ? '<p style="color:#666">No singers...</p>' : '';
    queue.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'queue-item';
      div.innerHTML = `<div class="singer-name">${item.singer}</div><div>${item.title}</div>`;
      qEl.appendChild(div);
    });
  }

  // --- SCORE SIMULATION ---
  function showScore() {
    const score = Math.floor(Math.random() * (100 - 80 + 1)) + 80;
    document.getElementById('finalScore').innerText = score;
    document.getElementById('ratingText').innerText = score > 95 ? "WORLD CLASS!" : "PROFESSIONAL!";
    document.getElementById('score-screen').style.display = 'flex';
  }

  function hideScore() {
    document.getElementById('score-screen').style.display = 'none';
    if (queue.length > 0) {
      const next = queue.shift();
      updateQueueUI();
      playNow(next.vId, next.title);
    }
  }

  document.getElementById('searchBtn').addEventListener('click', searchSongs);
  document.getElementById('playNextBtn').addEventListener('click', () => { if(queue.length > 0) showScore(); });
  document.getElementById('clearQueueBtn').addEventListener('click', () => { queue = []; updateQueueUI(); });
  document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') searchVideos(); });
</script>
</body>
</html>
