<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Platinum Videoke Ultra</title>
  <style>
    :root {
      --platinum-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --dark-bg: #050505;
      --panel-bg: rgba(20, 20, 20, 0.95);
      --glass-border: 1px solid rgba(212, 175, 55, 0.3);
    }

    * { box-sizing: border-box; }
    body, html {
      margin: 0; padding: 0;
      background: var(--dark-bg);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden; /* Prevents messy scrolling during singing */
      height: 100%;
    }

    /* --- THE STAGE (VIDEO AREA) --- */
    #stage-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      z-index: 100;
      transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #stage-container.minimized {
      height: 50%;
      border-bottom: 2px solid #bf953f;
    }

    #player-wrapper { width: 100%; height: 100%; }

    /* Touch layer to minimize */
    #video-touch-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 110;
      cursor: pointer;
    }

    /* --- THE DRAWER (SEARCH & QUEUE) --- */
    #ui-drawer {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 50%;
      background: var(--panel-bg);
      backdrop-filter: blur(15px);
      z-index: 90;
      padding: 20px;
      overflow-y: auto;
      display: none; /* Only shows when video is minimized */
    }

    #stage-container.minimized + #ui-drawer { display: block; }

    /* --- SCORE OVERLAY --- */
    #score-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 200;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
    }

    .score-circle {
      width: 220px; height: 220px;
      background: var(--platinum-gold);
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #000;
      box-shadow: 0 0 50px rgba(179, 135, 40, 0.6);
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

    /* --- PLATINUM UI ELEMENTS --- */
    .search-section { margin: 15px 0; }
    .input-group { display: flex; gap: 10px; }
    
    input {
      flex: 1; padding: 12px; border-radius: 10px;
      border: 1px solid #444; background: rgba(0,0,0,0.5); color: #fff;
    }

    button {
      padding: 10px 20px; border: none; border-radius: 10px;
      background: var(--platinum-gold); color: #000;
      font-weight: bold; cursor: pointer; text-transform: uppercase;
    }

    .done-btn {
      width: 100%; margin-bottom: 15px;
      background: none; border: 1px solid #bf953f; color: #bf953f;
    }

    .results {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px; margin-top: 15px;
    }

    .item {
      background: rgba(255,255,255,0.05); padding: 10px;
      border-radius: 12px; display: flex; gap: 10px; align-items: center;
    }

    .item img { width: 80px; border-radius: 5px; }
    .item h4 { margin: 0; font-size: 13px; flex: 1; }

    .q-btn { background: #333; color: #fff; font-size: 10px; padding: 8px; }

  </style>
</head>
<body>

  <div id="stage-container">
    <div id="video-touch-overlay">
      <div id="hint" style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.4); font-size:10px;">TAP TO SEARCH</div>
    </div>
    <div id="player-wrapper">
      <div id="player"></div>
    </div>
  </div>

  <div id="ui-drawer">
    <button class="done-btn" id="doneBtn">Done Selecting (Back to Singer)</button>
    
    <div class="search-section">
      <div class="input-group">
        <input id="searchInput" type="text" placeholder="Search Karaoke Song..." />
        <button id="searchBtn">Search</button>
      </div>
    </div>

    <div class="results" id="results"></div>

    <h3 style="color:#fcf6ba; border-bottom:1px solid #333; padding-bottom:5px;">Queue</h3>
    <div id="queue"></div>
  </div>

  <div id="score-screen">
    <h1 style="background: var(--platinum-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 40px;">FANTASTIC!</h1>
    <div class="score-circle">
      <div style="font-weight: bold;">RATING</div>
      <div id="scoreNum" style="font-size: 80px; font-weight: 900;">98</div>
    </div>
    <h2 id="ratingText" style="margin-top: 20px; letter-spacing: 3px;">PROFESSIONAL!</h2>
    <button onclick="closeScore()" style="margin-top: 30px; padding: 12px 50px; border-radius: 30px;">NEXT SINGER</button>
  </div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const API_KEY = 'AIzaSyBVcJ_KWBBTACy-FeeLAj8sE8ltNGTd8aQ'; 
  let player;
  let queue = [];

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%', width: '100%', videoId: '',
      playerVars: { 'autoplay': 1, 'rel': 0, 'controls': 0, 'modestbranding': 1 },
      events: { 'onStateChange': (e) => { if(e.data === 0) triggerScore(); } }
    });
  }

  // SCREEN TOGGLE LOGIC
  const stage = document.getElementById('stage-container');
  const touchOverlay = document.getElementById('video-touch-overlay');
  const doneBtn = document.getElementById('doneBtn');

  touchOverlay.addEventListener('click', () => {
    stage.classList.add('minimized');
    document.getElementById('hint').style.display = 'none';
  });

  doneBtn.addEventListener('click', () => {
    stage.classList.remove('minimized');
    document.getElementById('hint').style.display = 'block';
  });

  // SEARCH LOGIC
  async function searchVideos() {
    const q = document.getElementById('searchInput').value;
    if(!q) return;
    const resEl = document.getElementById('results');
    resEl.innerHTML = '<p style="color:#bf953f">Searching Platinum Library...</p>';

    try {
      const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + " karaoke instrumental")}&type=video&videoEmbeddable=true&maxResults=10&key=${API_KEY}`);
      const data = await response.json();
      renderResults(data.items);
    } catch(e) { resEl.innerHTML = '<p>Error. Check Key.</p>'; }
  }

  function renderResults(items) {
    const resEl = document.getElementById('results');
    resEl.innerHTML = '';
    items.forEach(item => {
      const vId = item.id.videoId;
      const title = item.snippet.title.replace("karaoke", "");
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <img src="${item.snippet.thumbnails.default.url}">
        <h4>${title}</h4>
        <div style="display:flex; flex-direction:column; gap:5px;">
          <button onclick="playNow('${vId}')" style="font-size:10px;">PLAY</button>
          <button onclick="addToQueue('${vId}', '${escape(title)}')" class="q-btn">QUEUE</button>
        </div>
      `;
      resEl.appendChild(div);
    });
  }

  function playNow(id) {
    player.loadVideoById(id);
    stage.classList.remove('minimized');
  }

  function addToQueue(id, title) {
    const singer = prompt("Singer's Name:", "Guest");
    if(singer) {
      queue.push({ id, title: unescape(title), singer });
      updateQueueUI();
    }
  }

  function updateQueueUI() {
    const qEl = document.getElementById('queue');
    qEl.innerHTML = queue.length ? '' : '<p style="color:#444">Queue is empty</p>';
    queue.forEach((item, i) => {
      const d = document.createElement('div');
      d.style = "padding:10px; background:rgba(0,0,0,0.3); border-radius:8px; margin-bottom:5px; border-left:2px solid #bf953f;";
      d.innerHTML = `<small style="color:#bf953f">${item.singer}</small><br>${item.title}`;
      qEl.appendChild(d);
    });
  }

  // SCORE SIMULATION
  function triggerScore() {
    const score = Math.floor(Math.random() * (100 - 82 + 1)) + 82;
    document.getElementById('scoreNum').innerText = score;
    let rating = "KEEP IT UP!";
    if(score > 96) rating = "WORLD CLASS!";
    else if(score > 89) rating = "PROFESSIONAL!";
    
    document.getElementById('ratingText').innerText = rating;
    document.getElementById('score-screen').style.display = 'flex';
  }

  function closeScore() {
    document.getElementById('score-screen').style.display = 'none';
    if(queue.length > 0) {
      const next = queue.shift();
      updateQueueUI();
      playNow(next.id);
    }
  }

  document.getElementById('searchBtn').addEventListener('click', searchVideos);
  document.getElementById('searchInput').addEventListener('keyup', (e) => { if(e.key === 'Enter') searchVideos(); });
</script>
</body>
                                        </html>
