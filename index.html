<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NZM Videoke Pro</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      overflow: hidden; /* Prevent body scroll during singing */
    }

    /* --- STAGE SYSTEM --- */
    #stage-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 100;
      transition: height 0.4s ease-in-out;
      display: flex;
      flex-direction: column;
    }

    /* When searching, the video shrinks to half */
    #stage-container.minimized {
      height: 50%;
      border-bottom: 2px solid #e11d48;
    }

    #player-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Overlay to catch taps/clicks on video */
    #video-touch-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 110;
      cursor: pointer;
    }

    /* --- SEARCH DRAWER (Bottom half) --- */
    #ui-drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: #1a1a1a;
      z-index: 90;
      padding: 15px;
      overflow-y: auto;
      display: none; /* Hidden until minimized */
    }

    #stage-container.minimized + #ui-drawer {
      display: block;
    }

    /* --- SCORE SCREEN --- */
    #score-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 200;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .score-circle {
      width: 220px; height: 220px;
      border: 8px solid #e11d48;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 0 30px #e11d48;
      margin: 20px;
      background: #000;
    }

    /* --- ORIGINAL STYLING ELEMENTS --- */
    .search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
    input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #0f0f0f; color: #fff; }
    button { padding: 12px 16px; border: none; border-radius: 8px; background: #e11d48; color: white; cursor: pointer; font-weight: bold; }
    .item { display: flex; gap: 12px; align-items: center; padding: 10px; border-radius: 10px; background: #101010; border: 1px solid #2d2d2d; margin-bottom: 8px; }
    .item img { width: 100px; border-radius: 5px; }
    .small-btn { background: #2563eb; padding: 8px 12px; font-size: 11px; }
    .close-btn { background: #444; width: 100%; margin-bottom: 15px; }
    .now-playing-tag { color: #e11d48; font-weight: bold; font-size: 12px; }

  </style>
</head>
<body>

  <div id="stage-container">
    <div id="video-touch-overlay"></div>
    <div id="player-wrapper">
        <div id="player"></div>
    </div>
  </div>

  <div id="ui-drawer">
    <button class="close-btn" id="closeBtn">DONE SELECTING (CLOSE)</button>
    
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Search Karaoke... e.g. My Way" />
      <button id="searchBtn">Search</button>
    </div>

    <div id="results"></div>
    
    <h3 style="margin-top: 20px; border-top: 1px solid #333; pt: 10px;">Singer Queue</h3>
    <div id="queue"></div>
  </div>

  <div id="score-overlay" id="scoreOverlay">
    <h1 style="color: #e11d48;">CONGRATULATIONS!</h1>
    <div class="score-circle">
      <span style="font-size: 14px;">YOUR SCORE</span>
      <span id="scoreNum" style="font-size: 80px; font-weight: 900;">98</span>
    </div>
    <h2 id="ratingText">PROFESSIONAL!</h2>
    <button onclick="hideScore()" style="margin-top: 30px; padding: 15px 50px; font-size: 18px;">NEXT SINGER</button>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const API_KEY = 'YOUR_API_KEY_HERE'; // Replace with your actual Key
    let player;
    let queue = [];

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: '',
        playerVars: { 'autoplay': 1, 'rel': 0, 'controls': 0, 'modestbranding': 1 },
        events: { 'onStateChange': onPlayerStateChange }
      });
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        showScore();
      }
    }

    // INTERFACE LOGIC
    const stage = document.getElementById('stage-container');
    const overlay = document.getElementById('video-touch-overlay');
    const closeBtn = document.getElementById('closeBtn');

    // Tapping video shrinks it and shows Search Drawer
    overlay.addEventListener('click', () => {
      stage.classList.add('minimized');
    });

    // Close button returns to full screen
    closeBtn.addEventListener('click', () => {
      stage.classList.remove('minimized');
    });

    async function searchVideos() {
      const query = document.getElementById('searchInput').value;
      if (!query) return;
      
      const resultsEl = document.getElementById('results');
      resultsEl.innerHTML = '<p>Searching Karaoke Database...</p>';

      try {
        // Automatically adds "karaoke" to query for better results
        const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + " karaoke")}&type=video&videoEmbeddable=true&maxResults=8&key=${API_KEY}`);
        const data = await response.json();
        renderResults(data.items);
      } catch (e) { resultsEl.innerHTML = '<p>Error. Check API Key.</p>'; }
    }

    function renderResults(items) {
      const resultsEl = document.getElementById('results');
      resultsEl.innerHTML = '';
      items.forEach(item => {
        const vId = item.id.videoId;
        const title = item.snippet.title;
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <img src="${item.snippet.thumbnails.default.url}">
          <div style="flex:1">
            <h4 style="margin:0; font-size:14px;">${title}</h4>
            <div style="margin-top:8px; display:flex; gap:5px;">
               <button onclick="playVideo('${vId}')" class="small-btn" style="background:#e11d48">PLAY</button>
               <button onclick="addToQueue('${vId}', '${escape(title)}')" class="small-btn">QUEUE</button>
            </div>
          </div>
        `;
        resultsEl.appendChild(div);
      });
    }

    function playVideo(vId) {
      player.loadVideoById(vId);
      stage.classList.remove('minimized'); // Auto-fullscreen on play
    }

    function addToQueue(vId, title) {
      queue.push({ vId, title: unescape(title) });
      renderQueue();
    }

    function renderQueue() {
      const qEl = document.getElementById('queue');
      qEl.innerHTML = queue.length ? '' : '<p style="color:#666">Empty</p>';
      queue.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = 'item';
        d.innerHTML = `<div style="flex:1"><b>${i+1}. ${s.title}</b></div><button class="small-btn" onclick="queue.splice(${i},1);renderQueue();">Remove</button>`;
        qEl.appendChild(d);
      });
    }

    // --- SCORE SIMULATION ---
    function showScore() {
      const score = Math.floor(Math.random() * (100 - 80 + 1)) + 80; // Random 80-100
      document.getElementById('scoreNum').innerText = score;
      
      let rating = "NICE EFFORT!";
      if(score >= 97) rating = "PERFECT! SINGER OF THE NIGHT!";
      else if(score >= 90) rating = "PROFESSIONAL!";
      else if(score >= 85) rating = "GREAT JOB!";

      document.getElementById('ratingText').innerText = rating;
      document.getElementById('score-overlay').style.display = 'flex';
    }

    function hideScore() {
      document.getElementById('score-overlay').style.display = 'none';
      if(queue.length > 0) {
        const next = queue.shift();
        renderQueue();
        playVideo(next.vId);
      }
    }

    document.getElementById('searchBtn').addEventListener('click', searchVideos);
    document.getElementById('searchInput').addEventListener('keyup', (e) => { if(e.key === 'Enter') searchVideos(); });
  </script>
</body>
</html>
