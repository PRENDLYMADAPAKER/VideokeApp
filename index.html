<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NZM Platinum Videoke Pro</title>
  <style>
    :root {
      --platinum-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --dark-bg: #050505;
      --drawer-bg: rgba(15, 15, 15, 0.98);
      --glass-border: 1px solid rgba(212, 175, 55, 0.3);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body, html {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      background: #000;
      font-family: 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      color: #fff;
    }

    #main-wrapper {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* LEFT SIDE: VIDEO PLAYER (EXPANDED) */
    #stage {
      flex: 1; 
      height: 100%;
      background: #000;
      position: relative;
      transition: flex 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Video player stays large (70%) when drawer is open */
    body.drawer-open #stage {
      flex: 0.7; 
    }

    #player-wrapper { width: 100%; height: 100%; pointer-events: none; }

    #touch-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      cursor: pointer;
    }

    /* RIGHT SIDE: NARROWER SIDE PANEL */
    #side-drawer {
      width: 0; 
      height: 100%;
      background: var(--drawer-bg);
      border-left: var(--glass-border);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body.drawer-open #side-drawer {
      width: 30vw; /* Pushes the panel more to the right */
    }

    .drawer-content {
      min-width: 28vw; 
      height: 100%;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* UI REFINEMENTS FOR NARROW PANEL */
    .panel {
      background: rgba(255,255,255,0.05);
      border: var(--glass-border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    input {
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444;
      background: #000; color: #fff; margin-bottom: 8px; font-size: 14px;
    }

    button {
      padding: 10px 15px; border: none; border-radius: 8px;
      background: var(--platinum-gold); color: #000;
      font-weight: bold; text-transform: uppercase; cursor: pointer;
      font-size: 11px;
    }

    .results-container { flex: 1; margin: 5px 0; }

    .song-item {
      display: flex; gap: 10px; padding: 8px; background: rgba(255,255,255,0.03);
      border-radius: 10px; margin-bottom: 8px; align-items: center;
    }
    .song-item img { width: 60px; border-radius: 5px; }
    .song-item h4 { margin: 0; font-size: 11px; flex: 1; color: #fcf6ba; }

    /* SCORE SYSTEM */
    #score-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.98); z-index: 100;
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }

    .score-circle {
      width: 200px; height: 200px; border-radius: 50%;
      background: var(--platinum-gold); color: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 0 40px #bf953f;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

    @media (max-width: 900px) {
      body.drawer-open #side-drawer { width: 40vw; }
      body.drawer-open #stage { flex: 0.6; }
    }
  </style>
</head>
<body class="drawer-open">

<div id="main-wrapper">
  <div id="stage">
    <div id="touch-overlay" onclick="toggleDrawer()"></div>
    <div id="player-wrapper">
      <div id="player"></div>
    </div>
  </div>

  <div id="side-drawer">
    <div class="drawer-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="margin:0; background:var(--platinum-gold); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-size:16px;">PLATINUM PRO</h3>
        <button onclick="toggleDrawer()" style="background:#333; color:#fff; font-size:9px; padding: 5px 8px;">CLOSE [X]</button>
      </div>

      <div class="panel">
        <small style="color:#888; text-transform:uppercase; font-size: 10px;">Now Singing</small>
        <div id="nowPlayingTitle" style="font-weight:bold; color:#bf953f; font-size:14px; margin-top:3px; word-wrap: break-word;">Select a Song</div>
      </div>

      <div class="panel">
        <input id="searchInput" type="text" placeholder="Search Song..." onkeypress="handleKey(event)"/>
        <button onclick="searchVideos()" style="width:100%">SEARCH</button>
      </div>

      <div class="results-container" id="results"></div>

      <h4 style="color:#fcf6ba; font-size:13px; border-bottom:1px solid #333; padding-bottom:5px;">QUEUE</h4>
      <div id="queue-list" style="margin-bottom:15px;"></div>
      
      <div style="display:flex; gap:8px; padding-bottom:15px;">
        <button onclick="playNextInQueue()" style="flex:1; font-size:10px;">NEXT</button>
        <button onclick="clearQueue()" style="flex:1; font-size:10px; background:#222; color:#fff;">RESET</button>
      </div>
    </div>
  </div>
</div>

<div id="score-screen">
  <h1 style="color: #bf953f; letter-spacing:3px;">FANTASTIC!</h1>
  <div class="score-circle">
    <div style="font-weight:bold;">SCORE</div>
    <div id="finalScore" style="font-size:70px; font-weight:900;">0</div>
  </div>
  <button onclick="hideScore()" style="margin-top:20px; padding:12px 40px; border-radius:30px;">NEXT SINGER</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const API_KEY = 'YOUR_API_KEY_HERE'; 
  let player;
  let queue = [];

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%', width: '100%', videoId: '',
      playerVars: { 'autoplay': 1, 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
      events: { 'onStateChange': (e) => { if(e.data === 0) triggerScore(); } }
    });
  }

  async function toggleDrawer() {
    const isOpen = document.body.classList.toggle('drawer-open');
    if (!isOpen) {
      try {
        const doc = document.documentElement;
        if (doc.requestFullscreen) await doc.requestFullscreen();
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape');
        }
      } catch (err) { console.log("Orientation lock requires user gesture."); }
    }
  }

  function handleKey(e) { if(e.key === 'Enter') searchVideos(); }

  async function searchVideos() {
    const query = document.getElementById('searchInput').value;
    if (!query) return;
    const resEl = document.getElementById('results');
    resEl.innerHTML = '<p style="color:#bf953f; font-size:12px; text-align:center;">Searching...</p>';

    try {
      const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + " karaoke instrumental")}&type=video&videoEmbeddable=true&maxResults=10&key=${API_KEY}`);
      const data = await response.json();
      renderResults(data.items);
    } catch (e) { resEl.innerHTML = '<p>Search Error.</p>'; }
  }

  function renderResults(items) {
    const resEl = document.getElementById('results');
    resEl.innerHTML = '';
    items.forEach(item => {
      const vId = item.id.videoId;
      const title = item.snippet.title.replace(/karaoke/gi, "").replace(/instrumental/gi, "");
      const div = document.createElement('div');
      div.className = 'song-item';
      div.innerHTML = `
        <img src="${item.snippet.thumbnails.default.url}">
        <div style="flex:1; overflow:hidden;">
          <h4 style="margin:0; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${title}</h4>
          <div style="display:flex; gap:5px; margin-top:5px;">
            <button onclick="playNow('${vId}', '${escape(title)}')" style="font-size:8px; padding:4px 8px;">PLAY</button>
            <button onclick="addToQueue('${vId}', '${escape(title)}')" style="font-size:8px; padding:4px 8px; background:#333; color:#fff;">+Q</button>
          </div>
        </div>`;
      resEl.appendChild(div);
    });
  }

  function playNow(vId, title) {
    document.getElementById('nowPlayingTitle').textContent = unescape(title);
    player.loadVideoById(vId);
    document.body.classList.remove('drawer-open');
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(()=>{});
        if(screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
    }
  }

  function addToQueue(vId, title) {
    const name = prompt("Singer Name:", "Guest");
    if(name) {
      queue.push({ vId, title: unescape(title), name });
      updateQueueUI();
    }
  }

  function updateQueueUI() {
    const qEl = document.getElementById('queue-list');
    qEl.innerHTML = queue.map((i, idx) => `
      <div style="padding:8px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:5px; border-left:3px solid #bf953f; font-size:10px;">
        <b style="color:#bf953f">${i.name}</b>: ${i.title}
      </div>`).join('');
  }

  function triggerScore() {
    const score = Math.floor(Math.random() * (100 - 85 + 1)) + 85;
    document.getElementById('finalScore').innerText = score;
    document.getElementById('score-screen').style.display = 'flex';
  }

  function hideScore() {
    document.getElementById('score-screen').style.display = 'none';
    if(queue.length > 0) {
      const next = queue.shift();
      updateQueueUI();
      playNow(next.vId, next.title);
    } else {
      document.body.classList.add('drawer-open');
    }
  }

  function clearQueue() { queue = []; updateQueueUI(); }
</script>
</body>
</html>
