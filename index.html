<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NZM Premium Videoke</title>
  <style>
    :root {
      --platinum-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --dark-bg: #050505;
      --panel-bg: rgba(25, 25, 25, 0.95);
      --glass-border: 1px solid rgba(212, 175, 55, 0.3);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }

    /* --- HOMEPAGE --- */
    #homepage { 
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--dark-bg); 
      background-image: radial-gradient(circle at 50% 10%, #1a1a1a 0%, #050505 100%);
      display: flex; flex-direction: column; padding: 15px; overflow-y: auto;
      transition: transform 0.5s ease-in-out; z-index: 10;
    }

    .hero-title { text-align: center; margin: 10px 0 20px 0; }
    .hero-title h1 { background: var(--platinum-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 28px; font-weight: 900; margin: 0; }
    
    .home-content { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 500px; margin: 0 auto; }
    .search-box { background: var(--panel-bg); border: var(--glass-border); border-radius: 15px; padding: 15px; }

    /* --- STAGE --- */
    #stage-view { 
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
      transform: translateY(100%); z-index: 20; display: flex; background: #000;
      transition: transform 0.5s ease;
    }

    body.in-stage #homepage { transform: translateY(-100%); }
    body.in-stage #stage-view { transform: translateY(0); }

    #stage { flex: 1; height: 100%; position: relative; transition: flex 0.5s ease; }
    body.drawer-open #stage { flex: 0.75; } 
    
    #side-drawer { 
      width: 0; height: 100%; background: rgba(10, 10, 10, 0.98); 
      border-left: var(--glass-border); transition: width 0.5s ease; 
      overflow: hidden; display: flex; flex-direction: column; 
    }
    body.drawer-open #side-drawer { width: 25vw; }

    /* --- UI ELEMENTS --- */
    input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 13px; margin-bottom: 8px; }
    .gold-btn { padding: 10px; border: none; border-radius: 8px; background: var(--platinum-gold); color: #000; font-weight: bold; text-transform: uppercase; width: 100%; cursor: pointer; font-size: 11px; }
    
    .song-item { display: flex; gap: 8px; padding: 6px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 6px; align-items: center; }
    .song-item img { width: 45px; border-radius: 4px; }
    .song-item h4 { margin: 0; font-size: 10px; flex: 1; color: #fcf6ba; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* QUEUE LIST STYLING */
    .queue-container { margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
    .queue-item { padding: 6px 10px; background: rgba(212, 175, 55, 0.1); border-radius: 6px; margin-bottom: 4px; font-size: 10px; border-left: 2px solid #bf953f; display: flex; justify-content: space-between; }

    #score-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    #touch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
  </style>
</head>
<body>

<div id="homepage">
  <div class="hero-title"><h1>NZM VIDEOKE🎤</h1></div>
  <div class="home-content">
    <div class="search-box">
      <input id="homeSearchInput" type="text" placeholder="Search Song or Artist..." onkeypress="if(event.key==='Enter') searchHome()">
      <button class="gold-btn" onclick="searchHome()">FIND SONG</button>
      <div id="homeResults" style="margin-top: 15px; max-height: 250px; overflow-y: auto;"></div>
    </div>
    <div class="search-box">
      <h3 style="margin:0 0 10px 0; font-size:13px; color:#fcf6ba;">UPCOMING SINGERS</h3>
      <div id="homeQueue"></div>
      <button class="gold-btn" onclick="playNextInQueue()" style="margin-top:10px; background:#222; color:#bf953f; border:1px solid #bf953f;">START PERFORMANCE</button>
    </div>
  </div>
</div>

<div id="stage-view">
  <div id="stage">
    <div id="touch-overlay" onclick="toggleDrawer()"></div>
    <div id="player" style="width:100%; height:100%;"></div>
  </div>
  <div id="side-drawer">
    <div style="padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
       <span style="font-size: 9px; font-weight: bold; color: #bf953f;">PERFORMANCE HUB</span>
       <button onclick="toggleDrawer()" style="background: #333; color: #fff; border: none; font-size: 8px; padding: 4px 8px; border-radius: 4px;">DONE</button>
    </div>
    <div style="padding: 12px; flex: 1; overflow-y: auto;">
      <small style="color:#888; font-size: 8px;">NOW PLAYING</small>
      <div id="stageNowPlaying" style="font-size:10px; color:#fcf6ba; margin-bottom: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">-</div>
      
      <input id="stageSearchInput" type="text" placeholder="Add another song..." style="font-size:11px;">
      <button class="gold-btn" onclick="searchStage()" style="font-size:9px; padding: 6px;">SEARCH</button>
      <div id="stageResults" style="margin-top:10px;"></div>
      
      <div class="queue-container">
        <h4 style="margin: 0 0 8px 0; font-size: 10px; color: #bf953f;">STAGE QUEUE</h4>
        <div id="stageQueue"></div>
      </div>

      <button onclick="exitToHome()" style="background:none; color:#444; width:100%; margin-top:20px; font-size:9px; border:none; text-decoration: underline;">EXIT TO MENU</button>
    </div>
  </div>
</div>

<div id="score-screen">
  <div style="width:180px; height:180px; border-radius:50%; background:var(--platinum-gold); color:#000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <b style="font-size:12px;">SCORE</b>
    <div id="finalScore" style="font-size:70px; font-weight:900;">0</div>
  </div>
  <button class="gold-btn" onclick="hideScore()" style="width:auto; padding: 10px 30px; border-radius: 20px; margin-top: 20px;">NEXT SINGER</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const API_KEY = 'AIzaSyBVcJ_KWBBTACy-FeeLAj8sE8ltNGTd8aQ'; 
  let player, queue = [];

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%', width: '100%', videoId: '',
      playerVars: { 'autoplay': 1, 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
      events: { 'onStateChange': (e) => { if(e.data === 0) triggerScore(); } }
    });
  }

  function toggleDrawer() { document.body.classList.toggle('drawer-open'); }

  async function enterStage(vId, title) {
    document.body.classList.add('in-stage');
    document.getElementById('stageNowPlaying').textContent = unescape(title);
    player.loadVideoById(vId);
    try {
      const doc = document.documentElement;
      if (doc.requestFullscreen) await doc.requestFullscreen();
      if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape');
    } catch(e) {}
  }

  function exitToHome() {
    document.body.classList.remove('in-stage');
    document.body.classList.remove('drawer-open');
    player.stopVideo();
    if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
  }

  async function searchHome() {
    const q = document.getElementById('homeSearchInput').value;
    const items = await fetchYoutube(q);
    renderResults(items, 'homeResults');
  }

  async function searchStage() {
    const q = document.getElementById('stageSearchInput').value;
    const items = await fetchYoutube(q);
    renderResults(items, 'stageResults');
  }

  async function fetchYoutube(q) {
    if(!q) return [];
    try {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + " karaoke instrumental")}&type=video&maxResults=8&key=${API_KEY}`);
      const data = await res.json();
      return data.items || [];
    } catch(e) { return []; }
  }

  function renderResults(items, targetId) {
    const el = document.getElementById(targetId);
    el.innerHTML = items.map(item => `
      <div class="song-item">
        <img src="${item.snippet.thumbnails.default.url}">
        <div style="flex:1; overflow:hidden;">
          <h4>${item.snippet.title}</h4>
          <div style="display:flex; gap:5px; margin-top:5px;">
            <button onclick="enterStage('${item.id.videoId}', '${escape(item.snippet.title)}')" style="font-size:8px; padding:3px 6px; background:var(--platinum-gold); border:none; border-radius:4px;">PLAY</button>
            <button onclick="addToQueue('${item.id.videoId}', '${escape(item.snippet.title)}')" style="font-size:8px; padding:3px 6px; background:#333; color:#fff; border:none; border-radius:4px;">+Q</button>
          </div>
        </div>
      </div>`).join('');
  }

  function addToQueue(vId, title) {
    queue.push({ vId, title: unescape(title) });
    updateQueueUI();
  }

  function updateQueueUI() {
    const queueHTML = queue.map((i, idx) => `
      <div class="queue-item">
        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"><b>#${idx + 1}</b> ${i.title}</span>
      </div>`).join('') || '<p style="color:#444; font-size:9px; text-align:center;">No upcoming songs</p>';
    
    // Sync both Queue containers
    document.getElementById('homeQueue').innerHTML = queueHTML;
    document.getElementById('stageQueue').innerHTML = queueHTML;
  }

  function playNextInQueue() {
    if(queue.length > 0) {
      const next = queue.shift();
      updateQueueUI();
      enterStage(next.vId, next.title);
    }
  }

  function triggerScore() {
    document.getElementById('finalScore').innerText = Math.floor(Math.random() * 15) + 85;
    document.getElementById('score-screen').style.display = 'flex';
  }

  function hideScore() {
    document.getElementById('score-screen').style.display = 'none';
    if(queue.length > 0) playNextInQueue();
    else exitToHome();
  }
</script>
</body>
</html>
