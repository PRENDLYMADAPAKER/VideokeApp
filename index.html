<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Platinum Videoke Ultra</title>
    <style>
        :root {
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --dark: #050505;
            --glass: rgba(20, 20, 20, 0.95);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* Prevent scrolling outside the drawer */
        }

        /* --- STAGE MODE (FULLSCREEN VIDEO) --- */
        #stage {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        #stage.minimized {
            height: 40%;
        }

        #player-wrapper {
            width: 100%; height: 100%;
            pointer-events: none; /* Prevents accidental YouTube UI clicks */
        }

        /* Overlay to catch touches on the video */
        #touch-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- SEARCH DRAWER --- */
        #drawer {
            position: fixed;
            bottom: -60%; /* Hidden by default */
            left: 0;
            width: 100%;
            height: 60%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-top: 2px solid #bf953f;
            z-index: 20;
            transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #drawer.open {
            bottom: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .close-btn {
            background: #cc0000;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* --- LISTS --- */
        .search-results {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item {
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            align-items: center;
        }

        .item img { width: 80px; border-radius: 5px; }
        .item-info { flex: 1; }
        .item-info h4 { margin: 0; font-size: 14px; color: #fcf6ba; }

        .btn-group { display: flex; gap: 8px; }
        .btn-group button { 
            padding: 6px 12px; 
            font-size: 11px; 
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
        .play-btn { background: var(--gold); color: #000; font-weight: bold; }
        .queue-btn { background: #333; color: #fff; }

        /* --- SCORE POPUP --- */
        #score-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .score-box {
            background: var(--gold);
            padding: 40px;
            border-radius: 50%;
            width: 200px; height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #000;
            box-shadow: 0 0 50px #bf953f;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="stage">
        <div id="touch-overlay">
            <div id="tap-hint" style="color: rgba(255,255,255,0.3); font-size: 12px;">TAP TO SEARCH</div>
        </div>
        <div id="player-wrapper">
            <div id="player"></div>
        </div>
    </div>

    <div id="drawer">
        <div class="drawer-header">
            <h2 style="margin:0; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">SONG SELECT</h2>
            <button class="close-btn" id="closeDrawer">CLOSE</button>
        </div>
        <input type="text" id="searchInput" placeholder="Enter Song Title or Artist...">
        <div class="search-results" id="results"></div>
    </div>

    <div id="score-screen">
        <h1 style="color: #fcf6ba; font-size: 40px;">SINGER SCORE</h1>
        <div class="score-box">
            <div style="font-size: 18px; font-weight: bold;">YOUR SCORE</div>
            <div id="final-score" style="font-size: 70px; font-weight: 900;">0</div>
        </div>
        <h2 id="rating-text" style="margin-top: 30px; letter-spacing: 5px;">PROFESSIONAL!</h2>
        <button onclick="closeScore()" style="margin-top: 20px; background: #fff; color: #000; padding: 10px 40px; border-radius: 30px;">NEXT SINGER</button>
    </div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const API_KEY = 'AIzaSyBVcJ_KWBBTACy-FeeLAj8sE8ltNGTd8aQ'; // Add your key here
    let player;
    let queue = [];
    const stage = document.getElementById('stage');
    const drawer = document.getElementById('drawer');
    const results = document.getElementById('results');

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%', videoId: '',
            playerVars: { 'autoplay': 1, 'rel': 0, 'controls': 0, 'disablekb': 1, 'modestbranding': 1 },
            events: { 
                'onStateChange': (e) => { 
                    if(e.data === YT.PlayerState.ENDED) showScore(); 
                } 
            }
        });
    }

    // Toggle UI when screen is touched
    document.getElementById('touch-overlay').addEventListener('click', () => {
        stage.classList.add('minimized');
        drawer.classList.add('open');
        document.getElementById('tap-hint').style.display = 'none';
    });

    document.getElementById('closeDrawer').addEventListener('click', () => {
        stage.classList.remove('minimized');
        drawer.classList.remove('open');
        document.getElementById('tap-hint').style.display = 'block';
    });

    async function searchSongs() {
        const query = document.getElementById('searchInput').value;
        if(!query) return;
        
        results.innerHTML = "<p>Searching Library...</p>";
        const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + " karaoke")}&type=video&videoEmbeddable=true&maxResults=10&key=${API_KEY}`;
        
        try {
            const res = await fetch(searchUrl);
            const data = await res.json();
            renderResults(data.items);
        } catch (e) { results.innerHTML = "<p>Search failed.</p>"; }
    }

    function renderResults(items) {
        results.innerHTML = "";
        items.forEach(item => {
            const vId = item.id.videoId;
            const title = item.snippet.title;
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <img src="${item.snippet.thumbnails.default.url}">
                <div class="item-info">
                    <h4>${title}</h4>
                </div>
                <div class="btn-group">
                    <button class="play-btn" onclick="playNow('${vId}')">PLAY</button>
                    <button class="queue-btn" onclick="addToQueue('${vId}', '${escape(title)}')">QUEUE</button>
                </div>
            `;
            results.appendChild(div);
        });
    }

    function playNow(id) {
        player.loadVideoById(id);
        stage.classList.remove('minimized');
        drawer.classList.remove('open');
    }

    function addToQueue(id, title) {
        queue.push({id, title: unescape(title)});
        alert("Added to Queue!");
    }

    // --- SCORE LOGIC ---
    function showScore() {
        const score = Math.floor(Math.random() * (100 - 75 + 1)) + 75; // Random score between 75-100
        document.getElementById('final-score').innerText = score;
        
        let rating = "NICE TRY!";
        if(score > 95) rating = "WORLD CLASS!";
        else if(score > 88) rating = "PROFESSIONAL!";
        else if(score > 80) rating = "AMATEUR";

        document.getElementById('rating-text').innerText = rating;
        document.getElementById('score-screen').style.display = 'flex';
    }

    function closeScore() {
        document.getElementById('score-screen').style.display = 'none';
        if(queue.length > 0) {
            const next = queue.shift();
            playNow(next.id);
        }
    }

    document.getElementById('searchInput').addEventListener('keyup', (e) => {
        if(e.key === 'Enter') searchSongs();
    });
</script>
</body>
</html>
