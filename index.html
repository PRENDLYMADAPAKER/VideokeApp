<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZM Videoke TV Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .gold {
      background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
    }
    .panel {
      background: rgba(12,12,12,.94);
      border-left: 1px solid rgba(217,179,93,.28);
    }
    #player {
      width: 100%;
      height: 100%;
    }
    #qrCode img,
    #qrCode canvas {
      border-radius: 12px;
    }
  </style>
</head>
<body class="text-white">
  <div id="loginScreen" class="fixed inset-0 z-50 grid place-items-center bg-black">
    <div class="w-[92vw] max-w-md rounded-3xl border border-yellow-500/30 bg-zinc-950 p-6 shadow-2xl">
      <h1 class="mb-2 text-center text-3xl font-black text-yellow-200">NZM VIDEOKE 🎤</h1>
      <p class="mb-5 text-center text-sm text-zinc-400">Login on the TV to create a private room.</p>

      <input id="emailInput" class="mb-3 w-full rounded-2xl bg-black p-4 text-white ring-1 ring-white/10" placeholder="Email" type="email" />
      <input id="passwordInput" class="mb-3 w-full rounded-2xl bg-black p-4 text-white ring-1 ring-white/10" placeholder="Password" type="password" />

      <button id="loginBtn" class="gold mb-3 w-full rounded-2xl p-4 font-black text-black">Login / Create Account</button>
      <p id="loginError" class="min-h-5 text-center text-sm text-red-300"></p>
    </div>
  </div>

  <main id="app" class="grid h-screen grid-cols-[1fr_360px]">
    <section class="relative bg-black">
      <div id="playerShell" class="relative h-full w-full bg-black">
        <div id="player" class="h-full w-full"></div>
        <div id="playerPlaceholder" class="absolute inset-0 grid place-items-center bg-black text-center">
          <div>
            <div class="mb-3 text-6xl">🎤</div>
            <div class="text-3xl font-black text-yellow-200">NZM VIDEOKE</div>
            <div class="mt-2 text-zinc-400">Waiting for song from remote...</div>
          </div>
        </div>
      </div>

      <div class="pointer-events-none absolute left-5 top-5 rounded-full bg-black/70 px-5 py-3 text-sm text-yellow-100 ring-1 ring-yellow-400/30">
        <span id="statusText">Waiting for remote...</span>
      </div>
    </section>

    <aside class="panel flex h-screen flex-col p-5">
      <div class="mb-5">
        <h1 class="text-3xl font-black text-yellow-200">NZM VIDEOKE 🎤</h1>
        <p class="mt-1 text-sm text-zinc-400">Player Only Mode</p>
      </div>

      <div class="mb-4 rounded-2xl border border-yellow-500/20 bg-yellow-500/10 p-4">
        <div class="text-xs uppercase tracking-widest text-yellow-300">Now Playing</div>
        <div id="nowPlaying" class="mt-2 line-clamp-3 text-lg font-bold">Nothing playing yet</div>
      </div>

      <div class="mb-3 flex items-center justify-between">
        <h2 class="text-xl font-black">Queued Songs</h2>
        <span id="queueCount" class="rounded-full bg-yellow-500/20 px-3 py-1 text-sm text-yellow-200">0</span>
      </div>

      <div id="queueList" class="min-h-0 flex-1 space-y-3 overflow-y-auto pr-1">
        <div class="rounded-2xl border border-white/10 bg-white/5 p-4 text-center text-zinc-500">No queued songs</div>
      </div>

      <div class="mt-5 rounded-3xl border border-yellow-500/20 bg-white p-4">
        <div id="qrCode" class="grid place-items-center"></div>
      </div>

      <p class="mt-2 break-all text-center text-xs text-zinc-400" id="remoteUrlText"></p>

      <button id="newRoomBtn" class="mt-3 rounded-2xl bg-zinc-800 p-3 text-sm font-bold text-yellow-100 ring-1 ring-yellow-500/20">
        New Room
      </button>
    </aside>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getDatabase,
      ref,
      onChildAdded,
      onValue,
      set,
      remove,
      get,
      update,
      off
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCFUZe8BZKPzU5E_es0Gv5xsqkliB3tTes",
      authDomain: "admin-panel-87530.firebaseapp.com",
      databaseURL: "https://admin-panel-87530-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "admin-panel-87530",
      storageBucket: "admin-panel-87530.firebasestorage.app",
      messagingSenderId: "1065643470010",
      appId: "1:1065643470010:web:ea79e85fef283dfb05a683",
      measurementId: "G-YSCLM1KL0Z"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const params = new URLSearchParams(location.search);
    let roomId = params.get("room") || localStorage.getItem("nzmRoom") || makeRoomId();

    let currentUser = null;
    let player = null;
    let playerReady = false;
    let hasLoadedVideo = false;
    let queueListenerRef = null;
    let commandsListenerRef = null;
    const processedCommands = new Set();

    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0,
          modestbranding: 1,
          playsinline: 1,
          enablejsapi: 1
        },
        events: {
          onReady: () => {
            playerReady = true;
            setStatus("Player ready. Scan QR to connect remote.");
          },
          onStateChange: (event) => {
            if (event.data === YT.PlayerState.ENDED) {
              playNextSong();
            }
          },
          onError: () => {
            setStatus("This video cannot be played. Press Next.");
          }
        }
      });
    };

    function loadYouTubeIframeApi() {
      if (window.YT && window.YT.Player) {
        window.onYouTubeIframeAPIReady();
        return;
      }

      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      document.body.appendChild(tag);
    }

    loadYouTubeIframeApi();

    function makeRoomId() {
      return Math.random().toString(36).slice(2, 8).toUpperCase();
    }

    function userRoomPath(path = "") {
      if (!currentUser) throw new Error("User is not logged in yet.");
      return `users/${currentUser.uid}/rooms/${roomId}${path ? "/" + path : ""}`;
    }

    function roomRef(path = "") {
      return ref(db, userRoomPath(path));
    }

    function setStatus(text) {
      document.getElementById("statusText").textContent = text;
    }

    function escapeHtml(value = "") {
      return String(value).replace(/[&<>'"]/g, c => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      }[c]));
    }

    function thumbnail(videoId) {
      return `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
    }

    async function loginOrCreate() {
      const email = document.getElementById("emailInput").value.trim();
      const password = document.getElementById("passwordInput").value;
      const err = document.getElementById("loginError");

      err.textContent = "";

      if (!email || !password) {
        err.textContent = "Enter email and password.";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (loginError) {
        try {
          await createUserWithEmailAndPassword(auth, email, password);
        } catch (createError) {
          err.textContent = createError.message;
        }
      }
    }

    document.getElementById("loginBtn").addEventListener("click", loginOrCreate);

    document.getElementById("passwordInput").addEventListener("keydown", e => {
      if (e.key === "Enter") loginOrCreate();
    });

    document.getElementById("newRoomBtn").addEventListener("click", async () => {
      roomId = makeRoomId();
      localStorage.setItem("nzmRoom", roomId);
      history.replaceState(null, "", `?room=${encodeURIComponent(roomId)}`);

      processedCommands.clear();

      if (currentUser) {
        stopListeners();
        await initRoom();
      }
    });

    onAuthStateChanged(auth, async user => {
      if (!user) return;

      currentUser = user;
      document.getElementById("loginScreen").style.display = "none";

      localStorage.setItem("nzmRoom", roomId);
      history.replaceState(null, "", `?room=${encodeURIComponent(roomId)}`);

      await initRoom();
    });

    async function initRoom() {
      await update(roomRef(), {
        roomId,
        ownerUid: currentUser.uid,
        updatedAt: Date.now()
      });

      renderQR();
      listenQueue();
      listenCommands();

      setStatus("Room active. Scan QR to connect.");
      console.log("TV listening at:", userRoomPath());
    }

    function renderQR() {
      const remoteUrl = `https://videokeremote.vercel.app/?room=${encodeURIComponent(roomId)}&owner=${encodeURIComponent(currentUser.uid)}`;

      document.getElementById("remoteUrlText").textContent = remoteUrl;
      document.getElementById("qrCode").innerHTML = "";

      new QRCode(document.getElementById("qrCode"), {
        text: remoteUrl,
        width: 220,
        height: 220,
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    function stopListeners() {
      if (queueListenerRef) {
        off(queueListenerRef);
        queueListenerRef = null;
      }

      if (commandsListenerRef) {
        off(commandsListenerRef);
        commandsListenerRef = null;
      }
    }

    function listenQueue() {
      queueListenerRef = roomRef("queue");

      onValue(queueListenerRef, snapshot => {
        const items = [];

        snapshot.forEach(child => {
          items.push({
            key: child.key,
            ...child.val()
          });
        });

        items.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
        renderQueue(items);
      });
    }

    function renderQueue(items) {
      document.getElementById("queueCount").textContent = items.length;

      const list = document.getElementById("queueList");

      if (!items.length) {
        list.innerHTML = `<div class="rounded-2xl border border-white/10 bg-white/5 p-4 text-center text-zinc-500">No queued songs</div>`;
        return;
      }

      list.innerHTML = items.map((item, index) => `
        <div class="flex gap-3 rounded-2xl border border-yellow-500/20 bg-yellow-500/10 p-3">
          <div class="grid h-10 w-10 shrink-0 place-items-center rounded-xl bg-yellow-500 font-black text-black">#${index + 1}</div>
          <img class="h-14 w-20 rounded-xl object-cover" src="${item.thumbnail || thumbnail(item.videoId)}" />
          <div class="min-w-0 flex-1">
            <div class="line-clamp-2 font-bold text-yellow-100">${escapeHtml(item.title || item.videoId)}</div>
            <div class="text-sm text-zinc-400">${escapeHtml(item.singer || "Guest")}</div>
          </div>
        </div>
      `).join("");
    }

    function listenCommands() {
      commandsListenerRef = roomRef("commands");

      onChildAdded(commandsListenerRef, async snapshot => {
        if (processedCommands.has(snapshot.key)) return;
        processedCommands.add(snapshot.key);

        const cmd = snapshot.val();

        if (!cmd) return;

        console.log("TV command received:", cmd);

        if (cmd.type === "play") {
          await handleRemotePlay();
        }

        if (cmd.type === "pause" && playerReady && hasLoadedVideo) {
          player.pauseVideo();
        }

        if (cmd.type === "next") {
          await playNextSong();
        }

        if (cmd.type === "replay" && playerReady && hasLoadedVideo) {
          player.seekTo(0, true);
          player.playVideo();
        }

        if (cmd.type === "volume" && playerReady) {
          player.setVolume(Number(cmd.value || 80));
        }

        if (cmd.type === "playVideo" && cmd.videoId) {
          await playSpecificSong(cmd);
        }
      });
    }

    async function handleRemotePlay() {
      if (!playerReady) {
        setStatus("Player still loading. Try Play again.");
        return;
      }

      if (hasLoadedVideo) {
        try {
          player.unMute();
          player.playVideo();
          setStatus("Playing");
        } catch (error) {
          console.warn(error);
          setStatus("Could not resume video.");
        }
        return;
      }

      await playNextSong();
    }

    async function playNextSong() {
      const snap = await get(roomRef("queue"));
      const items = [];

      snap.forEach(child => {
        items.push({
          key: child.key,
          ...child.val()
        });
      });

      items.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

      if (!items.length) {
        setStatus("Queue empty");
        return;
      }

      await playSpecificSong(items[0], items[0].key);
    }

    async function playSpecificSong(song, queueKey = null) {
      if (!song.videoId) return;

      hasLoadedVideo = true;

      const placeholder = document.getElementById("playerPlaceholder");
      if (placeholder) placeholder.style.display = "none";

      if (playerReady) {
        player.loadVideoById(song.videoId);

        const forceRemoteAutoplay = () => {
          try {
            player.unMute();
            player.playVideo();
            setStatus("Playing");
          } catch (error) {
            console.warn(error);
          }
        };

        setTimeout(forceRemoteAutoplay, 300);
        setTimeout(forceRemoteAutoplay, 900);
        setTimeout(forceRemoteAutoplay, 1500);
      } else {
        setStatus("Player still loading. Try Play again.");
      }

      await set(roomRef("nowPlaying"), {
        ...song,
        startedAt: Date.now()
      });

      document.getElementById("nowPlaying").textContent = song.title || song.videoId;
      setStatus("Now playing");

      if (queueKey) {
        await remove(roomRef(`queue/${queueKey}`));
      }
    }
  </script>
</body>
</html>
